<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sonsbeek Pavilion — Aldo van Eyck, 1966</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;touch-action:none}
body{background:#fff;color:#222}
body.dark{background:#1a1a1a;color:#eee}

#viewport{width:100%;height:100%}

#info{position:fixed;top:12px;left:16px;font-size:13px;color:#666;pointer-events:none;user-select:none}
body.dark #info{color:#888}

#modes{position:fixed;top:12px;right:16px;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:520px}
#modes button{padding:5px 12px;border:1px solid #bbb;background:rgba(255,255,255,0.85);border-radius:16px;cursor:pointer;font-size:12px;color:#444;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:all .15s}
#modes button:hover{border-color:#888}
#modes button.active{background:#222;color:#fff;border-color:#222}
body.dark #modes button{background:rgba(40,40,40,0.85);color:#bbb;border-color:#555}
body.dark #modes button.active{background:#eee;color:#222;border-color:#eee}

#tools{position:fixed;bottom:16px;right:16px;display:flex;gap:6px}
#tools button{width:36px;height:36px;border:1px solid #bbb;background:rgba(255,255,255,0.85);border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all .15s}
#tools button:hover{border-color:#888;background:rgba(255,255,255,1)}
body.dark #tools button{background:rgba(40,40,40,0.85);color:#bbb;border-color:#555}

#views{position:fixed;bottom:16px;left:16px;display:flex;gap:6px}
#views button{padding:5px 12px;border:1px solid #bbb;background:rgba(255,255,255,0.85);border-radius:16px;cursor:pointer;font-size:12px;color:#444;backdrop-filter:blur(6px);transition:all .15s}
#views button:hover{border-color:#888}
#views button.active{background:#222;color:#fff;border-color:#222}
body.dark #views button{background:rgba(40,40,40,0.85);color:#bbb;border-color:#555}
body.dark #views button.active{background:#eee;color:#222;border-color:#eee}

#loadPanel{display:none;position:fixed;bottom:60px;right:16px;background:rgba(255,255,255,0.95);border:1px solid #ccc;border-radius:10px;padding:12px;width:260px;backdrop-filter:blur(8px)}
#loadPanel.show{display:block}
#loadPanel label{display:inline-block;padding:6px 14px;border:1px solid #bbb;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:8px}
#loadPanel input[type=file]{display:none}
body.dark #loadPanel{background:rgba(30,30,30,0.95);border-color:#555}
body.dark #loadPanel label{border-color:#555;color:#bbb}
</style>
</head>
<body>

<div id="viewport"></div>
<div id="info">Sonsbeek Pavilion &middot; Aldo van Eyck, 1966</div>

<div id="modes">
  <button class="active" data-mode="pen">Pen</button>
  <button data-mode="penShaded">Pen+Shaded</button>
  <button data-mode="shaded">Shaded</button>
  <button data-mode="arctic">Arctic</button>
  <button data-mode="ghosted">Ghosted</button>

</div>

<div id="tools">

</div>

<div id="loadPanel">

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* ===================================================================
   EMBEDDED MODEL — Sonsbeek Pavilion geometry
   =================================================================== */
const SONSBEEK = {"meta":{"name":"Sonsbeek Pavilion","architect":"Aldo van Eyck","year":1966,"units":"meters"},"site":{"circle_radius":9,"platform_width":24,"platform_depth":16},"walls":[{"id":"W2","x":-4.2,"thickness":0.2,"height":2.87,"segments":[{"y_start":-5.5,"y_end":-0.5},{"y_start":0.8,"y_end":6}]},{"id":"W3","x":-2.5,"thickness":0.2,"height":2.87,"segments":[{"y_start":-7,"y_end":5.5}]},{"id":"W4","x":-0.8,"thickness":0.2,"height":2.87,"segments":[{"y_start":-5.5,"y_end":-1.5},{"y_start":-0.2,"y_end":7.5}]},{"id":"W5","x":0.8,"thickness":0.2,"height":2.87,"segments":[{"y_start":-7.5,"y_end":0.2},{"y_start":1.5,"y_end":5.5}]},{"id":"W6","x":2.5,"thickness":0.2,"height":2.87,"segments":[{"y_start":-5.5,"y_end":7}]},{"id":"W7","x":4.2,"thickness":0.2,"height":2.87,"segments":[{"y_start":-6,"y_end":-0.8},{"y_start":0.5,"y_end":5.5}]}],"curved_walls":[{"id":"CW1","center":[-1.65,3],"radius":0.85,"start_angle_deg":0,"end_angle_deg":180,"height":2.87,"thickness":0.2},{"id":"CW2","center":[-1.65,-3.5],"radius":0.85,"start_angle_deg":180,"end_angle_deg":360,"height":2.87,"thickness":0.2},{"id":"CW3","center":[0,4],"radius":0.8,"start_angle_deg":0,"end_angle_deg":180,"height":2.87,"thickness":0.2},{"id":"CW4","center":[0,-2.5],"radius":0.8,"start_angle_deg":180,"end_angle_deg":360,"height":2.87,"thickness":0.2},{"id":"CW5","center":[1.65,2.5],"radius":0.85,"start_angle_deg":0,"end_angle_deg":180,"height":2.87,"thickness":0.2},{"id":"CW6","center":[1.65,-4],"radius":0.85,"start_angle_deg":180,"end_angle_deg":360,"height":2.87,"thickness":0.2}],"discs":[{"id":"D1","center":[-0.3,7],"radius":0.35,"height":0.9},{"id":"D2","center":[-1.5,1],"radius":0.8,"height":0.9},{"id":"D3","center":[3.3,-2.5],"radius":0.6,"height":0.9},{"id":"D4","center":[0.3,-7],"radius":0.35,"height":0.9}],"benches":[{"id":"B1","x":-6,"thickness":0.8,"height":0.9,"segments":[{"y_start":-4,"y_end":4}]},{"id":"B2","x":6,"thickness":0.8,"height":0.9,"segments":[{"y_start":-5,"y_end":5}]},{"id":"B3","x":3.35,"thickness":0.5,"height":0.9,"segments":[{"y_start":1,"y_end":3.5}]},{"id":"B4","x":1.2,"thickness":0.5,"height":0.9,"segments":[{"y_start":-5.5,"y_end":-4.5},{"y_start":-6.5,"y_end":-5.8}]}],"low_walls":[]};

/* ===================================================================
   GLOBALS
   =================================================================== */
let scene, perspCamera, orthoCamera, camera, renderer, controls;
let surfaceGroup, edgeGroup, outlineGroup, groundGroup;
let depthTarget;
let hiddenLineEdgeMat;
let standardEdgeMat;
let outlineMat;
let currentMode = 'pen';
let isOrtho = false;
let isDark = false;
const allSurfaces = [];
const allEdgeLines = [];
const allOutlines = [];
const BG = { light: 0xffffff, dark: 0x1a1a1a };
const ORTHO_SIZE = 22; // frustum size for orthographic views

/* ===================================================================
   MATERIALS PER DISPLAY MODE
   =================================================================== */
const modeMats = {};
function createModeMaterials() {
  var DS = THREE.DoubleSide;
  modeMats.pen = {
    wall: new THREE.MeshBasicMaterial({color:0xffffff, side:DS}),
    disc: new THREE.MeshBasicMaterial({color:0xf0f0f0, side:DS}),
    bench: new THREE.MeshBasicMaterial({color:0xeeeeee, side:DS}),
    ground: new THREE.MeshBasicMaterial({color:0xf8f8f8, side:DS}),
    edges:true, shadows:false, bg:0xffffff, bgDark:0x1a1a1a, outline:true,
  };
  modeMats.penShaded = {
    wall: new THREE.MeshStandardMaterial({color:0xc8bca8, roughness:0.85, side:DS}),
    disc: new THREE.MeshStandardMaterial({color:0xb0a898, roughness:0.80, side:DS}),
    bench: new THREE.MeshStandardMaterial({color:0xb8b0a0, roughness:0.85, side:DS}),
    ground: new THREE.MeshStandardMaterial({color:0xd8d0c4, roughness:0.95, side:DS}),
    edges:true, shadows:true, bg:0xf0ede8, bgDark:0x1e1c1a, outline:true,
  };
  modeMats.shaded = {
    wall: new THREE.MeshStandardMaterial({color:0xc8bca8, roughness:0.85, side:DS}),
    disc: new THREE.MeshStandardMaterial({color:0xb0a898, roughness:0.80, side:DS}),
    bench: new THREE.MeshStandardMaterial({color:0xb8b0a0, roughness:0.85, side:DS}),
    ground: new THREE.MeshStandardMaterial({color:0xd8d0c4, roughness:0.95, side:DS}),
    edges:false, shadows:true, bg:0xf0ede8, bgDark:0x1e1c1a, outline:false,
  };
  modeMats.arctic = {
    wall: new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.75, side:DS}),
    disc: new THREE.MeshStandardMaterial({color:0xf5f5f5, roughness:0.70, side:DS}),
    bench: new THREE.MeshStandardMaterial({color:0xf0f0f0, roughness:0.75, side:DS}),
    ground: new THREE.MeshStandardMaterial({color:0xeeeeee, roughness:0.90, side:DS}),
    edges:false, shadows:true, bg:0xf5f5f5, bgDark:0x222222, outline:false,
  };
  modeMats.ghosted = {
    wall: new THREE.MeshStandardMaterial({color:0xc8bca8, transparent:true, opacity:0.22, roughness:0.8, side:DS, depthWrite:false}),
    disc: new THREE.MeshStandardMaterial({color:0xb0a898, transparent:true, opacity:0.18, roughness:0.8, side:DS, depthWrite:false}),
    bench: new THREE.MeshStandardMaterial({color:0xb8b0a0, transparent:true, opacity:0.18, roughness:0.8, side:DS, depthWrite:false}),
    ground: new THREE.MeshStandardMaterial({color:0xd8d0c4, transparent:true, opacity:0.10, roughness:0.9, side:DS, depthWrite:false}),
    edges:true, shadows:false, bg:0xffffff, bgDark:0x1a1a1a, outline:false,
  };
  modeMats.wire = {
    wall: new THREE.MeshBasicMaterial({wireframe:true, color:0x444444, side:DS}),
    disc: new THREE.MeshBasicMaterial({wireframe:true, color:0x666666, side:DS}),
    bench: new THREE.MeshBasicMaterial({wireframe:true, color:0x555555, side:DS}),
    ground: new THREE.MeshBasicMaterial({wireframe:true, color:0x999999, side:DS}),
    edges:false, shadows:false, bg:0xffffff, bgDark:0x1a1a1a, outline:false,
  };
  modeMats.xray = {
    wall: new THREE.MeshBasicMaterial({wireframe:true, color:0x4488cc, transparent:true, opacity:0.35, side:DS}),
    disc: new THREE.MeshBasicMaterial({wireframe:true, color:0x66aaee, transparent:true, opacity:0.30, side:DS}),
    bench: new THREE.MeshBasicMaterial({wireframe:true, color:0x4488cc, transparent:true, opacity:0.30, side:DS}),
    ground: new THREE.MeshBasicMaterial({wireframe:true, color:0x88aacc, transparent:true, opacity:0.15, side:DS}),
    edges:false, shadows:false, bg:0xf5f8ff, bgDark:0x0a1520, outline:false,
  };
}

/* ===================================================================
   HIDDEN-LINE EDGE SHADER
   =================================================================== */
function createEdgeMaterials() {
  standardEdgeMat = new THREE.LineBasicMaterial({color: 0x333333});

  hiddenLineEdgeMat = new THREE.ShaderMaterial({
    uniforms: {
      tDepth:     {value: null},
      resolution: {value: new THREE.Vector2(1, 1)},
      dashSize:   {value: 0.12},
      gapSize:    {value: 0.08},
      solidColor: {value: new THREE.Color(0x000000)},
      dashedColor:{value: new THREE.Color(0x999999)},
    },
    vertexShader: [
      'attribute float lineDistance;',
      'varying float vLineDistance;',
      'void main() {',
      '  vLineDistance = lineDistance;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tDepth;',
      'uniform vec2 resolution;',
      'uniform float dashSize;',
      'uniform float gapSize;',
      'uniform vec3 solidColor;',
      'uniform vec3 dashedColor;',
      'varying float vLineDistance;',
      '',
      'void main() {',
      '  vec2 uv = gl_FragCoord.xy / resolution;',
      '  float sceneDepth = texture2D(tDepth, uv).r;',
      '  float lineDepth = gl_FragCoord.z;',
      '',
      '  if (lineDepth > sceneDepth + 0.00015) {',
      '    float total = dashSize + gapSize;',
      '    if (mod(vLineDistance, total) > dashSize) discard;',
      '    gl_FragColor = vec4(dashedColor, 1.0);',
      '  } else {',
      '    gl_FragColor = vec4(solidColor, 1.0);',
      '  }',
      '}'
    ].join('\n'),
    depthTest: false,
    depthWrite: false,
    transparent: false,
  });

  outlineMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    side: THREE.BackSide,
  });
}

/* ===================================================================
   GEOMETRY BUILDERS
   =================================================================== */

function buildWallSegment(x, yStart, yEnd, height, thickness, category) {
  var length = Math.abs(yEnd - yStart);
  var geo = new THREE.BoxGeometry(thickness, height, length);
  var mesh = new THREE.Mesh(geo);
  mesh.position.set(x, height / 2, -(yStart + yEnd) / 2);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.layers.set(0);
  allSurfaces.push({mesh: mesh, category: category});
  surfaceGroup.add(mesh);

  var edgeGeo = new THREE.EdgesGeometry(geo, 25);
  var edgeLine = new THREE.LineSegments(edgeGeo, hiddenLineEdgeMat);
  edgeLine.position.copy(mesh.position);
  edgeLine.computeLineDistances();
  edgeLine.layers.set(1);
  allEdgeLines.push(edgeLine);
  edgeGroup.add(edgeLine);

  addOutline(mesh, geo, 0.025);
}

function buildCurvedWall(cw) {
  var cx = cw.center[0];
  var cz = -cw.center[1];
  var r = cw.radius;
  var t = cw.thickness;
  var h = cw.height;
  var startA = cw.start_angle_deg * Math.PI / 180;
  var endA = cw.end_angle_deg * Math.PI / 180;
  var segs = 32;
  var innerR = r - t / 2;
  var outerR = r + t / 2;

  var pos = [];
  var idx = [];

  for (var i = 0; i <= segs; i++) {
    var a = startA + (endA - startA) * (i / segs);
    var c = Math.cos(a), s = Math.sin(a);
    pos.push(
      cx + innerR * c, 0, cz - innerR * s,
      cx + innerR * c, h, cz - innerR * s,
      cx + outerR * c, 0, cz - outerR * s,
      cx + outerR * c, h, cz - outerR * s
    );
  }

  for (var i = 0; i < segs; i++) {
    var b = i * 4, n = (i + 1) * 4;
    idx.push(b+2, n+2, n+3, b+2, n+3, b+3);
    idx.push(b+0, b+1, n+1, b+0, n+1, n+0);
    idx.push(b+1, b+3, n+3, b+1, n+3, n+1);
    idx.push(b+0, n+0, n+2, b+0, n+2, b+2);
  }
  idx.push(0, 2, 3, 0, 3, 1);
  var last = segs * 4;
  idx.push(last, last+1, last+3, last, last+3, last+2);

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();

  var mesh = new THREE.Mesh(geo);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.layers.set(0);
  allSurfaces.push({mesh: mesh, category: 'wall'});
  surfaceGroup.add(mesh);

  var edgeGeo = new THREE.EdgesGeometry(geo, 25);
  var edgeLine = new THREE.LineSegments(edgeGeo, hiddenLineEdgeMat);
  edgeLine.computeLineDistances();
  edgeLine.layers.set(1);
  allEdgeLines.push(edgeLine);
  edgeGroup.add(edgeLine);

  addOutline(mesh, geo, 0.022);
}

function buildDisc(disc) {
  var geo = new THREE.CylinderGeometry(disc.radius, disc.radius, disc.height, 32);
  var mesh = new THREE.Mesh(geo);
  mesh.position.set(disc.center[0], disc.height / 2, -disc.center[1]);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.layers.set(0);
  allSurfaces.push({mesh: mesh, category: 'disc'});
  surfaceGroup.add(mesh);

  var edgeGeo = new THREE.EdgesGeometry(geo, 25);
  var edgeLine = new THREE.LineSegments(edgeGeo, hiddenLineEdgeMat);
  edgeLine.position.copy(mesh.position);
  edgeLine.computeLineDistances();
  edgeLine.layers.set(1);
  allEdgeLines.push(edgeLine);
  edgeGroup.add(edgeLine);

  addOutline(mesh, geo, 0.02);
}

function buildGround(site) {
  var geo = new THREE.CylinderGeometry(site.circle_radius, site.circle_radius, 0.05, 64);
  var mesh = new THREE.Mesh(geo);
  mesh.position.set(0, -0.025, 0);
  mesh.receiveShadow = true;
  mesh.layers.set(0);
  allSurfaces.push({mesh: mesh, category: 'ground'});
  groundGroup.add(mesh);

  var ringGeo = new THREE.RingGeometry(site.circle_radius - 0.02, site.circle_radius + 0.02, 64);
  var ringMat = new THREE.MeshBasicMaterial({color: 0xcccccc, side: THREE.DoubleSide});
  var ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.001;
  ring.layers.set(0);
  groundGroup.add(ring);
}

function addOutline(originalMesh, geo, expansion) {
  var cloneGeo = geo.clone();
  var p = cloneGeo.getAttribute('position');
  var n = cloneGeo.getAttribute('normal');
  if (!n) return;

  for (var i = 0; i < p.count; i++) {
    p.setXYZ(i,
      p.getX(i) + n.getX(i) * expansion,
      p.getY(i) + n.getY(i) * expansion,
      p.getZ(i) + n.getZ(i) * expansion
    );
  }
  p.needsUpdate = true;

  var outline = new THREE.Mesh(cloneGeo, outlineMat);
  outline.position.copy(originalMesh.position);
  outline.quaternion.copy(originalMesh.quaternion);
  outline.scale.copy(originalMesh.scale);
  outline.layers.set(2);
  allOutlines.push(outline);
  outlineGroup.add(outline);
}

/* ===================================================================
   BUILD THE FULL MODEL
   =================================================================== */
function buildModel(data) {
  // Straight walls (full height)
  data.walls.forEach(function(w) {
    w.segments.forEach(function(seg) {
      buildWallSegment(w.x, seg.y_start, seg.y_end, w.height, w.thickness, 'wall');
    });
  });

  // Curved walls (full height)
  data.curved_walls.forEach(function(cw) {
    buildCurvedWall(cw);
  });

  // Discs (bench height)
  data.discs.forEach(function(d) {
    buildDisc(d);
  });

  // Benches (bench height rectangular elements)
  if (data.benches) {
    data.benches.forEach(function(b) {
      b.segments.forEach(function(seg) {
        buildWallSegment(b.x, seg.y_start, seg.y_end, b.height, b.thickness, 'bench');
      });
    });
  }

  // Low walls (legacy support)
  if (data.low_walls) {
    data.low_walls.forEach(function(lw) {
      lw.segments.forEach(function(seg) {
        buildWallSegment(lw.x, seg.y_start, seg.y_end, lw.height, lw.thickness, 'bench');
      });
    });
  }

  // Ground
  buildGround(data.site);
}

/* ===================================================================
   LIGHTING
   =================================================================== */
var dirLight;
function setupLighting() {
  var hemi = new THREE.HemisphereLight(0xfff5e6, 0xb0c4de, 0.6);
  scene.add(hemi);

  dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 15, 8);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -15;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.bias = -0.0005;
  scene.add(dirLight);

  var fill = new THREE.DirectionalLight(0xb0c4de, 0.3);
  fill.position.set(-6, 8, -6);
  scene.add(fill);

  var amb = new THREE.AmbientLight(0xffffff, 0.15);
  scene.add(amb);
}

/* ===================================================================
   DISPLAY MODE SWITCHING
   =================================================================== */
function applyMode(mode) {
  currentMode = mode;
  var m = modeMats[mode];
  if (!m) return;

  allSurfaces.forEach(function(s) {
    s.mesh.material = m[s.category] || m.wall;
  });

  edgeGroup.visible = m.edges;
  outlineGroup.visible = !!m.outline;

  renderer.shadowMap.enabled = m.shadows;
  dirLight.castShadow = m.shadows;
  allSurfaces.forEach(function(s) {
    s.mesh.castShadow = m.shadows;
    s.mesh.receiveShadow = m.shadows;
  });

  var bg = isDark ? (m.bgDark || BG.dark) : (m.bg || BG.light);
  scene.background = new THREE.Color(bg);

  document.querySelectorAll('#modes button').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

/* ===================================================================
   RENDER LOOP
   =================================================================== */
function render() {
  if (currentMode === 'pen' || currentMode === 'penShaded') {
    renderPenMode();
  } else if (currentMode === 'ghosted') {
    renderGhostedMode();
  } else {
    renderStandardMode();
  }
}

function renderPenMode() {
  var w = renderer.domElement.width;
  var h = renderer.domElement.height;

  if (depthTarget.width !== w || depthTarget.height !== h) {
    depthTarget.setSize(w, h);
  }

  // Pass 1: surfaces to depth target
  camera.layers.set(0);
  renderer.setRenderTarget(depthTarget);
  renderer.clear();
  renderer.render(scene, camera);

  hiddenLineEdgeMat.uniforms.tDepth.value = depthTarget.depthTexture;
  hiddenLineEdgeMat.uniforms.resolution.value.set(w, h);

  // Pass 2: outlines to screen
  renderer.setRenderTarget(null);
  renderer.clear();
  camera.layers.set(2);
  renderer.render(scene, camera);

  // Pass 3: surfaces on top
  renderer.autoClear = false;
  camera.layers.set(0);
  renderer.render(scene, camera);

  // Pass 4: edges with hidden-line shader
  camera.layers.set(1);
  renderer.render(scene, camera);

  renderer.autoClear = true;
  camera.layers.enableAll();
}

function renderGhostedMode() {
  allEdgeLines.forEach(function(line) { line.material = standardEdgeMat; });

  camera.layers.enable(0);
  camera.layers.enable(1);
  camera.layers.disable(2);
  renderer.setRenderTarget(null);
  renderer.clear();
  renderer.render(scene, camera);
  camera.layers.enableAll();

  allEdgeLines.forEach(function(line) { line.material = hiddenLineEdgeMat; });
}

function renderStandardMode() {
  camera.layers.enable(0);
  camera.layers.disable(1);
  camera.layers.disable(2);
  renderer.setRenderTarget(null);
  renderer.clear();
  renderer.render(scene, camera);
  camera.layers.enableAll();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  render();
}

/* ===================================================================
   CAMERA MANAGEMENT
   =================================================================== */
function createCameras() {
  perspCamera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 200);
  var aspect = innerWidth / innerHeight;
  orthoCamera = new THREE.OrthographicCamera(
    -ORTHO_SIZE * aspect / 2, ORTHO_SIZE * aspect / 2,
    ORTHO_SIZE / 2, -ORTHO_SIZE / 2,
    0.1, 200
  );
  camera = perspCamera;
}

function updateOrthoFrustum() {
  var aspect = innerWidth / innerHeight;
  // Calculate frustum from perspective camera distance
  var dist = camera.position.distanceTo(controls.target);
  var size = isOrtho ? ORTHO_SIZE : dist * Math.tan(perspCamera.fov * Math.PI / 360) * 2;
  orthoCamera.left = -size * aspect / 2;
  orthoCamera.right = size * aspect / 2;
  orthoCamera.top = size / 2;
  orthoCamera.bottom = -size / 2;
  orthoCamera.updateProjectionMatrix();
}

function setOrthoFrustumSize(size) {
  var aspect = innerWidth / innerHeight;
  orthoCamera.left = -size * aspect / 2;
  orthoCamera.right = size * aspect / 2;
  orthoCamera.top = size / 2;
  orthoCamera.bottom = -size / 2;
  orthoCamera.updateProjectionMatrix();
}

function switchCamera(newCamera) {
  var target = controls.target.clone();
  var pos = camera.position.clone();
  var up = camera.up.clone();

  camera = newCamera;
  camera.position.copy(pos);
  camera.up.copy(up);

  controls.dispose();
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.target.copy(target);
  controls.update();
}

function toggleProjection() {
  if (isOrtho) {
    // Switch to perspective
    isOrtho = false;
    switchCamera(perspCamera);
    document.getElementById('btnProj').textContent = 'Parallel';
  } else {
    // Switch to orthographic
    isOrtho = true;
    updateOrthoFrustum();
    switchCamera(orthoCamera);
    document.getElementById('btnProj').textContent = 'Perspective';
  }
  document.getElementById('btnProj').classList.toggle('active', isOrtho);
}

function fitCamera() {
  perspCamera.position.set(16, 11, 16);
  orthoCamera.position.set(16, 11, 16);
  controls.target.set(0, 1.2, 0);
  camera.up.set(0, 1, 0);
  if (isOrtho) {
    setOrthoFrustumSize(ORTHO_SIZE);
  }
  controls.update();
}

function viewPlan() {
  // Switch to ortho if not already
  if (!isOrtho) {
    isOrtho = true;
    switchCamera(orthoCamera);
    document.getElementById('btnProj').textContent = 'Perspective';
    document.getElementById('btnProj').classList.add('active');
  }
  camera.position.set(0, 30, 0);
  camera.up.set(0, 0, -1);
  controls.target.set(0, 0, 0);
  setOrthoFrustumSize(22);
  controls.update();
}

function viewElevation() {
  // Switch to ortho if not already
  if (!isOrtho) {
    isOrtho = true;
    switchCamera(orthoCamera);
    document.getElementById('btnProj').textContent = 'Perspective';
    document.getElementById('btnProj').classList.add('active');
  }
  camera.position.set(0, 1.5, 25);
  camera.up.set(0, 1, 0);
  controls.target.set(0, 1.5, 0);
  setOrthoFrustumSize(18);
  controls.update();
}

/* ===================================================================
   INITIALIZATION
   =================================================================== */
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(BG.light);

  createCameras();

  renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.getElementById('viewport').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;

  // Depth render target
  var depthTex = new THREE.DepthTexture();
  depthTex.type = THREE.UnsignedIntType;
  depthTarget = new THREE.WebGLRenderTarget(
    renderer.domElement.width,
    renderer.domElement.height,
    {depthTexture: depthTex, depthBuffer: true, stencilBuffer: false}
  );

  surfaceGroup = new THREE.Group();
  edgeGroup = new THREE.Group();
  outlineGroup = new THREE.Group();
  groundGroup = new THREE.Group();
  scene.add(surfaceGroup);
  scene.add(edgeGroup);
  scene.add(outlineGroup);
  scene.add(groundGroup);

  createModeMaterials();
  createEdgeMaterials();
  setupLighting();
  buildModel(SONSBEEK);
  fitCamera();
  applyMode('pen');

  window.addEventListener('resize', onResize);
  setupUI();
  animate();
}

function onResize() {
  var aspect = innerWidth / innerHeight;
  perspCamera.aspect = aspect;
  perspCamera.updateProjectionMatrix();

  // Update ortho frustum on resize
  if (isOrtho) {
    var hSize = (orthoCamera.top - orthoCamera.bottom);
    orthoCamera.left = -hSize * aspect / 2;
    orthoCamera.right = hSize * aspect / 2;
    orthoCamera.updateProjectionMatrix();
  } else {
    var oAspect = aspect;
    orthoCamera.left = -ORTHO_SIZE * oAspect / 2;
    orthoCamera.right = ORTHO_SIZE * oAspect / 2;
    orthoCamera.updateProjectionMatrix();
  }

  renderer.setSize(innerWidth, innerHeight);
  depthTarget.setSize(renderer.domElement.width, renderer.domElement.height);
}

/* ===================================================================
   UI
   =================================================================== */
function setupUI() {
  // Mode buttons
  document.querySelectorAll('#modes button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      applyMode(btn.dataset.mode);
    });
  });

  // Fit
  document.getElementById('btnFit').addEventListener('click', fitCamera);

  // Theme toggle
  document.getElementById('btnTheme').addEventListener('click', function() {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    applyMode(currentMode);
  });

  // Camera projection toggle
  document.getElementById('btnProj').addEventListener('click', toggleProjection);

  // Plan view
  document.getElementById('btnPlan').addEventListener('click', viewPlan);

  // Elevation view
  document.getElementById('btnElev').addEventListener('click', viewElevation);

  // Load JSON
  var loadPanel = document.getElementById('loadPanel');
  document.getElementById('btnLoad').addEventListener('click', function() {
    loadPanel.classList.toggle('show');
  });

  document.getElementById('fileInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        clearModel();
        buildModel(data);
        applyMode(currentMode);
        fitCamera();
        loadPanel.classList.remove('show');
      } catch (err) {
        alert('Error parsing JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
  });
}

function clearModel() {
  while (surfaceGroup.children.length) surfaceGroup.remove(surfaceGroup.children[0]);
  while (edgeGroup.children.length) edgeGroup.remove(edgeGroup.children[0]);
  while (outlineGroup.children.length) outlineGroup.remove(outlineGroup.children[0]);
  while (groundGroup.children.length) groundGroup.remove(groundGroup.children[0]);
  allSurfaces.length = 0;
  allEdgeLines.length = 0;
  allOutlines.length = 0;
}

/* ===================================================================
   START
   =================================================================== */
init();
</script>
</body>
</html>
