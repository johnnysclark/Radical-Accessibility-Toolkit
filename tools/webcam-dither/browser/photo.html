<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dithertone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  color: #eee;
  font-family: -apple-system, system-ui, sans-serif;
  touch-action: manipulation;
  min-height: 100vh;
}
#start-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  gap: 16px; padding: 20px;
}
#start-screen h1 { font-size: 24px; }
#start-screen p { font-size: 14px; color: #aaa; max-width: 320px; text-align: center; }
.start-btn {
  display: block; width: 280px;
  padding: 16px; border: none; border-radius: 12px;
  font-size: 18px; font-weight: 600;
  cursor: pointer; color: #fff; text-align: center;
}
.btn-photo { background: #2a6; }
.btn-library { background: #46a; }
.btn-live { background: #a72; }
.camera-select {
  font-size: 14px; padding: 8px 12px; border-radius: 8px;
  background: #222; color: #ccc; border: 1px solid #444;
}
input[type="file"] { display: none; }
video { display: none; }
.hidden { display: none !important; }
#canvas-container {
  width: 100vw;
  display: flex; align-items: center; justify-content: center;
  padding: 8px; overflow: hidden;
}
#output {
  max-width: 100%;
  max-height: calc(100vh - 300px);
  border-radius: 4px;
}
.controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(20, 20, 20, 0.97);
  padding: 8px 12px 24px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.controls-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.controls-row label {
  font-size: 12px; min-width: 70px; color: #aaa;
}
.controls-row input[type="range"] {
  flex: 1; height: 32px; accent-color: #4af;
}
.controls-row .val {
  font-size: 12px; min-width: 36px; text-align: right;
  font-variant-numeric: tabular-nums;
}
.btn-row { display: flex; gap: 8px; margin-top: 6px; }
.btn {
  flex: 1; padding: 12px 4px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; color: #fff;
}
.btn-save { background: #2a2; }
.btn-bracket { background: #c72; }
.btn-invert { background: #555; }
.btn-new { background: #447; }
.btn-flip { background: #a72; }
.controls-toggle {
  display: block; width: 100%; padding: 6px 0; border: none;
  background: transparent; color: #888; font-size: 12px;
  cursor: pointer; text-align: center; letter-spacing: 1px;
}
.controls-toggle:active { color: #fff; }
#panelContent { overflow: hidden; transition: max-height 0.25s ease; }
#panelContent.collapsed { max-height: 0 !important; margin: 0; padding: 0; }
.toggle-row {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;
}
.toggle-btn {
  flex: 1 1 auto; min-width: 60px; padding: 8px 4px; border: 2px solid #444; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  color: #aaa; background: transparent; text-align: center;
}
.toggle-btn.active {
  border-color: #4af; color: #fff; background: rgba(68,170,255,0.15);
}
#status {
  position: fixed; top: 8px; left: 8px; right: 8px;
  text-align: center; font-size: 13px; color: #8f8;
  pointer-events: none; z-index: 5;
}
</style>
</head>
<body>

<div id="start-screen">
  <h1>Dithertone</h1>
  <p>Convert photos to tactile dot patterns for PIAF printing. Multiple dithering algorithms with live preview.</p>
  <button class="start-btn btn-photo" id="takePhotoBtn">Take Photo</button>
  <button class="start-btn btn-library" id="choosePhotoBtn">Choose from Library</button>
  <button class="start-btn btn-live" id="liveBtn">Live Camera</button>
  <select id="cameraSelect" class="camera-select">
    <option value="environment">Back Camera</option>
    <option value="user">Front Camera</option>
  </select>
  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <input type="file" id="libraryInput" accept="image/*">
</div>

<div id="editor" class="hidden">
  <div id="canvas-container">
    <canvas id="output"></canvas>
  </div>
  <video id="video" playsinline autoplay muted></video>
  <div id="status"></div>
  <div class="controls">
    <button class="controls-toggle" id="togglePanel">&#9650; Controls</button>
    <div id="panelContent">
      <div class="controls-row" id="spacingRow">
        <label>Spacing</label>
        <input type="range" id="spacing" min="2" max="30" value="8" step="1">
        <span class="val" id="spacingVal">8</span>
      </div>
      <div class="controls-row hidden" id="scaleRow">
        <label>Scale</label>
        <input type="range" id="scale" min="1" max="8" value="3" step="1">
        <span class="val" id="scaleVal">3</span>
      </div>
      <div class="controls-row">
        <label>Gamma</label>
        <input type="range" id="gamma" min="0.2" max="4.0" value="1.0" step="0.1">
        <span class="val" id="gammaVal">1.0</span>
      </div>
      <div class="controls-row">
        <label>Contrast</label>
        <input type="range" id="contrast" min="-100" max="100" value="0" step="5">
        <span class="val" id="contrastVal">0</span>
      </div>
      <div class="controls-row">
        <label>Brightness</label>
        <input type="range" id="brightness" min="-100" max="100" value="0" step="5">
        <span class="val" id="brightnessVal">0</span>
      </div>
      <div class="toggle-row" id="algoRow">
        <button class="toggle-btn active" data-algo="dithertone">Dots</button>
        <button class="toggle-btn" data-algo="floyd">Floyd</button>
        <button class="toggle-btn" data-algo="atkinson">Atkinson</button>
        <button class="toggle-btn" data-algo="stucki">Stucki</button>
        <button class="toggle-btn" data-algo="bayer">Bayer</button>
        <button class="toggle-btn" data-algo="halftone">Lines</button>
        <button class="toggle-btn" data-algo="crosshatch">Hatch</button>
        <button class="toggle-btn" data-algo="engrave">Engrave</button>
        <button class="toggle-btn" data-algo="stipple">Stipple</button>
        <button class="toggle-btn" data-algo="ox">OX</button>
      </div>
      <div class="toggle-row" id="shapeRow">
        <button class="toggle-btn active" data-shape="circle">Circle</button>
        <button class="toggle-btn" data-shape="cross">Cross</button>
        <button class="toggle-btn" data-shape="dash">Dash</button>
        <button class="toggle-btn" data-shape="diamond">Diamond</button>
      </div>
      <div class="btn-row" id="photoButtons">
        <button class="btn btn-save" id="saveBtn">Save</button>
        <button class="btn btn-bracket" id="bracketBtn">Bracket</button>
        <button class="btn btn-invert" id="invertBtn">Invert</button>
        <button class="btn btn-new" id="newBtn">New</button>
      </div>
      <div class="btn-row hidden" id="liveButtons">
        <button class="btn btn-save" id="captureBtn">Capture</button>
        <button class="btn btn-bracket" id="liveBracketBtn">Bracket</button>
        <button class="btn btn-invert" id="liveInvertBtn">Invert</button>
        <button class="btn btn-flip" id="flipBtn">Flip</button>
        <button class="btn btn-new" id="stopBtn">Stop</button>
      </div>
    </div>
  </div>
</div>

<script>
var output = document.getElementById('output');
var ctx = output.getContext('2d');
var statusEl = document.getElementById('status');
var video = document.getElementById('video');

// Source image data (grayscale)
var sourceGray = null;
var sourceW = 0;
var sourceH = 0;
var inverted = false;
var currentShape = 'circle';
var currentAlgo = 'dithertone';
var liveMode = false;
var liveRunning = false;
var facingMode = 'environment';

// Hidden canvas for grabbing video frames
var srcCanvas = document.createElement('canvas');
var srcCtx = srcCanvas.getContext('2d', { willReadFrequently: true });

// Sliders
var spacingSlider = document.getElementById('spacing');
var scaleSlider = document.getElementById('scale');
var gammaSlider = document.getElementById('gamma');
var contrastSlider = document.getElementById('contrast');
var brightnessSlider = document.getElementById('brightness');

// Pixel-level algorithms that use the scale slider instead of spacing
var PIXEL_ALGOS = { floyd: 1, atkinson: 1, stucki: 1, bayer: 1 };

function getParams() {
  return {
    spacing: parseInt(spacingSlider.value),
    scale: parseInt(scaleSlider.value),
    gamma: parseFloat(gammaSlider.value),
    contrast: parseFloat(contrastSlider.value),
    brightness: parseFloat(brightnessSlider.value),
    invert: inverted,
    shape: currentShape,
    algorithm: currentAlgo,
    maxRadiusFactor: 0.45,
    minRadius: 0.5,
  };
}

function updateDisplays() {
  document.getElementById('spacingVal').textContent = spacingSlider.value;
  document.getElementById('scaleVal').textContent = scaleSlider.value;
  document.getElementById('gammaVal').textContent = parseFloat(gammaSlider.value).toFixed(1);
  document.getElementById('contrastVal').textContent = contrastSlider.value;
  document.getElementById('brightnessVal').textContent = brightnessSlider.value;
}

function updateSliderVisibility() {
  var isPixel = currentAlgo in PIXEL_ALGOS;
  document.getElementById('spacingRow').classList.toggle('hidden', isPixel);
  document.getElementById('scaleRow').classList.toggle('hidden', !isPixel);
}

function onParamChange() {
  updateDisplays();
  if (sourceGray && !liveMode) render(sourceGray, sourceW, sourceH, getParams());
}
spacingSlider.addEventListener('input', onParamChange);
scaleSlider.addEventListener('input', onParamChange);
gammaSlider.addEventListener('input', onParamChange);
contrastSlider.addEventListener('input', onParamChange);
brightnessSlider.addEventListener('input', onParamChange);

// Panel toggle (hides entire control panel except the toggle button)
var panelContent = document.getElementById('panelContent');
var togglePanelBtn = document.getElementById('togglePanel');
panelContent.style.maxHeight = panelContent.scrollHeight + 'px';
togglePanelBtn.addEventListener('click', function() {
  var collapsed = panelContent.classList.toggle('collapsed');
  togglePanelBtn.innerHTML = collapsed ? '&#9660; Controls' : '&#9650; Controls';
  if (!collapsed) panelContent.style.maxHeight = panelContent.scrollHeight + 'px';
});

// Gamma LUT
var gammaLUT = new Uint8Array(256);
var lastGamma = -1;
function buildGammaLUT(gamma) {
  if (gamma === lastGamma) return;
  var invGamma = 1.0 / gamma;
  for (var i = 0; i < 256; i++) {
    gammaLUT[i] = Math.round(Math.pow(i / 255, invGamma) * 255);
  }
  lastGamma = gamma;
}

function adjustPixels(gray, params) {
  var result = new Uint8Array(gray.length);
  var factor = (100 + params.contrast) / 100;
  buildGammaLUT(params.gamma);
  for (var i = 0; i < gray.length; i++) {
    var v = gray[i] + params.brightness;
    v = 128 + factor * (v - 128);
    v = Math.max(0, Math.min(255, v));
    if (params.gamma !== 1.0) v = gammaLUT[Math.round(v)];
    result[i] = v;
  }
  return result;
}

// ── Main render dispatcher ──
function render(gray, w, h, params) {
  switch (params.algorithm) {
    case 'dithertone':  renderDithertone(gray, w, h, params); break;
    case 'floyd':       renderFloydSteinberg(gray, w, h, params); break;
    case 'atkinson':    renderAtkinson(gray, w, h, params); break;
    case 'stucki':      renderStucki(gray, w, h, params); break;
    case 'bayer':       renderBayer(gray, w, h, params); break;
    case 'halftone':    renderHalftone(gray, w, h, params); break;
    case 'crosshatch':  renderCrosshatch(gray, w, h, params); break;
    case 'engrave':     renderEngrave(gray, w, h, params); break;
    case 'stipple':     renderStipple(gray, w, h, params); break;
    case 'ox':          renderOX(gray, w, h, params); break;
  }
}

// ── Dithertone (variable-size shapes on grid) ──
function renderDithertone(gray, w, h, params) {
  var adjusted = adjustPixels(gray, params);
  var spacing = params.spacing;
  var maxRadius = spacing * params.maxRadiusFactor;
  var minRadius = params.minRadius;
  var half = Math.floor(spacing / 2);
  var shape = params.shape || 'circle';

  output.width = w;
  output.height = h;

  if (params.invert) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#000';
  }

  for (var y = half; y < h; y += spacing) {
    for (var x = half; x < w; x += spacing) {
      var b = adjusted[y * w + x];
      var radius;
      if (params.invert) {
        radius = maxRadius * (b / 255);
      } else {
        radius = maxRadius * (1 - b / 255);
      }
      if (radius > minRadius) {
        drawShape(ctx, x, y, radius, shape);
      }
    }
  }
}

function drawShape(c, x, y, r, shape) {
  switch (shape) {
    case 'circle':
      c.beginPath();
      c.arc(x, y, r, 0, Math.PI * 2);
      c.fill();
      break;
    case 'cross':
      var t = r * 0.35;
      c.fillRect(x - r, y - t, r * 2, t * 2);
      c.fillRect(x - t, y - r, t * 2, r * 2);
      break;
    case 'dash':
      c.fillRect(x - r, y - r * 0.3, r * 2, r * 0.6);
      break;
    case 'diamond':
      c.beginPath();
      c.moveTo(x, y - r);
      c.lineTo(x + r, y);
      c.lineTo(x, y + r);
      c.lineTo(x - r, y);
      c.closePath();
      c.fill();
      break;
  }
}

// ── Downscale helper for pixel-level algorithms ──
// Uses spacing as a scale factor: higher spacing = more downscale = chunkier pixels.
// Dithers at reduced resolution, then nearest-neighbor upscales back.
function downsampleGray(gray, w, h, spacing) {
  if (spacing <= 1) return { gray: gray, w: w, h: h };
  var sw = Math.max(1, Math.round(w / spacing));
  var sh = Math.max(1, Math.round(h / spacing));
  var small = new Uint8Array(sw * sh);
  for (var y = 0; y < sh; y++) {
    for (var x = 0; x < sw; x++) {
      var srcX = Math.min(Math.round(x * w / sw), w - 1);
      var srcY = Math.min(Math.round(y * h / sh), h - 1);
      small[y * sw + x] = gray[srcY * w + srcX];
    }
  }
  return { gray: small, w: sw, h: sh };
}

function upsampleToCanvas(imgData, sw, sh, w, h) {
  var src = imgData.data;
  output.width = w;
  output.height = h;
  var dst = ctx.createImageData(w, h);
  var pix = dst.data;
  for (var y = 0; y < h; y++) {
    var sy = Math.min(Math.floor(y * sh / h), sh - 1);
    for (var x = 0; x < w; x++) {
      var sx = Math.min(Math.floor(x * sw / w), sw - 1);
      var si = (sy * sw + sx) * 4;
      var di = (y * w + x) * 4;
      pix[di] = src[si];
      pix[di + 1] = src[si + 1];
      pix[di + 2] = src[si + 2];
      pix[di + 3] = 255;
    }
  }
  ctx.putImageData(dst, 0, 0);
}

// ── Floyd-Steinberg error diffusion ──
function renderFloydSteinberg(gray, w, h, params) {
  var ds = downsampleGray(adjustPixels(gray, params), w, h, params.scale);
  var sw = ds.w, sh = ds.h;
  var err = new Float32Array(ds.gray.length);
  for (var i = 0; i < ds.gray.length; i++) err[i] = ds.gray[i];

  var imgData = ctx.createImageData(sw, sh);
  var pix = imgData.data;

  for (var y = 0; y < sh; y++) {
    for (var x = 0; x < sw; x++) {
      var idx = y * sw + x;
      var old = err[idx];
      var nv = old < 128 ? 0 : 255;
      if (params.invert) nv = 255 - nv;
      var e = old - (old < 128 ? 0 : 255);

      var pi = idx * 4;
      pix[pi] = pix[pi + 1] = pix[pi + 2] = nv;
      pix[pi + 3] = 255;

      if (x + 1 < sw) err[idx + 1] += e * 7 / 16;
      if (y + 1 < sh) {
        if (x > 0) err[idx + sw - 1] += e * 3 / 16;
        err[idx + sw] += e * 5 / 16;
        if (x + 1 < sw) err[idx + sw + 1] += e * 1 / 16;
      }
    }
  }
  upsampleToCanvas(imgData, sw, sh, w, h);
}

// ── Bayer ordered dither (4x4) ──
var BAYER4 = [
   0, 8, 2, 10,
  12, 4, 14,  6,
   3, 11, 1,  9,
  15, 7, 13,  5
];
// Scale to 0-255
var bayerThreshold = new Uint8Array(16);
for (var i = 0; i < 16; i++) {
  bayerThreshold[i] = Math.round((BAYER4[i] / 16) * 255);
}

function renderBayer(gray, w, h, params) {
  var ds = downsampleGray(adjustPixels(gray, params), w, h, params.scale);
  var sw = ds.w, sh = ds.h;

  var imgData = ctx.createImageData(sw, sh);
  var pix = imgData.data;

  for (var y = 0; y < sh; y++) {
    for (var x = 0; x < sw; x++) {
      var idx = y * sw + x;
      var v = ds.gray[idx];
      var thresh = bayerThreshold[(y % 4) * 4 + (x % 4)];
      var nv = v > thresh ? 255 : 0;
      if (params.invert) nv = 255 - nv;

      var pi = idx * 4;
      pix[pi] = pix[pi + 1] = pix[pi + 2] = nv;
      pix[pi + 3] = 255;
    }
  }
  upsampleToCanvas(imgData, sw, sh, w, h);
}

// ── Halftone lines ──
function renderHalftone(gray, w, h, params) {
  var adjusted = adjustPixels(gray, params);
  var spacing = params.spacing;
  var half = Math.floor(spacing / 2);
  var maxThick = spacing * 0.9;

  output.width = w;
  output.height = h;

  if (params.invert) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#000';
  }

  for (var y = half; y < h; y += spacing) {
    for (var x = half; x < w; x += spacing) {
      var b = adjusted[y * w + x];
      var thick;
      if (params.invert) {
        thick = maxThick * (b / 255);
      } else {
        thick = maxThick * (1 - b / 255);
      }
      if (thick > 0.5) {
        var ht = thick / 2;
        ctx.fillRect(x - half, y - ht, spacing, thick);
      }
    }
  }
}

// ── Atkinson error diffusion ──
// Distributes only 6/8 of quantization error, giving a lighter, more open look.
// Classic original Macintosh algorithm.
function renderAtkinson(gray, w, h, params) {
  var ds = downsampleGray(adjustPixels(gray, params), w, h, params.scale);
  var sw = ds.w, sh = ds.h;
  var err = new Float32Array(ds.gray.length);
  for (var i = 0; i < ds.gray.length; i++) err[i] = ds.gray[i];

  var imgData = ctx.createImageData(sw, sh);
  var pix = imgData.data;

  for (var y = 0; y < sh; y++) {
    for (var x = 0; x < sw; x++) {
      var idx = y * sw + x;
      var old = err[idx];
      var nv = old < 128 ? 0 : 255;
      if (params.invert) nv = 255 - nv;
      var e = (old - (old < 128 ? 0 : 255)) / 8;

      var pi = idx * 4;
      pix[pi] = pix[pi + 1] = pix[pi + 2] = nv;
      pix[pi + 3] = 255;

      // Spread 1/8 to each of 6 neighbors (total 6/8, discards 2/8)
      if (x + 1 < sw) err[idx + 1] += e;
      if (x + 2 < sw) err[idx + 2] += e;
      if (y + 1 < sh) {
        if (x > 0) err[idx + sw - 1] += e;
        err[idx + sw] += e;
        if (x + 1 < sw) err[idx + sw + 1] += e;
      }
      if (y + 2 < sh) err[idx + sw * 2] += e;
    }
  }
  upsampleToCanvas(imgData, sw, sh, w, h);
}

// ── Stucki error diffusion ──
// Wider 5-column, 3-row kernel for smoother gradients than Floyd-Steinberg.
function renderStucki(gray, w, h, params) {
  var ds = downsampleGray(adjustPixels(gray, params), w, h, params.scale);
  var sw = ds.w, sh = ds.h;
  var err = new Float32Array(ds.gray.length);
  for (var i = 0; i < ds.gray.length; i++) err[i] = ds.gray[i];

  var imgData = ctx.createImageData(sw, sh);
  var pix = imgData.data;

  for (var y = 0; y < sh; y++) {
    for (var x = 0; x < sw; x++) {
      var idx = y * sw + x;
      var old = err[idx];
      var nv = old < 128 ? 0 : 255;
      if (params.invert) nv = 255 - nv;
      var e = old - (old < 128 ? 0 : 255);

      var pi = idx * 4;
      pix[pi] = pix[pi + 1] = pix[pi + 2] = nv;
      pix[pi + 3] = 255;

      // Row 0 (current): x+1 = 8/42, x+2 = 4/42
      if (x + 1 < sw) err[idx + 1] += e * 8 / 42;
      if (x + 2 < sw) err[idx + 2] += e * 4 / 42;
      // Row 1: -2=2, -1=4, 0=8, +1=4, +2=2
      if (y + 1 < sh) {
        if (x > 1) err[idx + sw - 2] += e * 2 / 42;
        if (x > 0) err[idx + sw - 1] += e * 4 / 42;
        err[idx + sw] += e * 8 / 42;
        if (x + 1 < sw) err[idx + sw + 1] += e * 4 / 42;
        if (x + 2 < sw) err[idx + sw + 2] += e * 2 / 42;
      }
      // Row 2: -2=1, -1=2, 0=4, +1=2, +2=1
      if (y + 2 < sh) {
        var r2 = idx + sw * 2;
        if (x > 1) err[r2 - 2] += e * 1 / 42;
        if (x > 0) err[r2 - 1] += e * 2 / 42;
        err[r2] += e * 4 / 42;
        if (x + 1 < sw) err[r2 + 1] += e * 2 / 42;
        if (x + 2 < sw) err[r2 + 2] += e * 1 / 42;
      }
    }
  }
  upsampleToCanvas(imgData, sw, sh, w, h);
}

// ── Crosshatch ──
// Layers lines at different angles based on darkness level.
// Light areas get fewer line directions, dark areas stack up to 4 directions.
function renderCrosshatch(gray, w, h, params) {
  var adjusted = adjustPixels(gray, params);
  var spacing = params.spacing;

  output.width = w;
  output.height = h;

  if (params.invert) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#fff';
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#000';
  }

  ctx.lineWidth = Math.max(1, spacing * 0.15);

  var half = Math.floor(spacing / 2);
  for (var cy = half; cy < h; cy += spacing) {
    for (var cx = half; cx < w; cx += spacing) {
      var b = adjusted[cy * w + cx];
      var darkness = params.invert ? (b / 255) : (1 - b / 255);

      var level = 0;
      if (darkness > 0.15) level = 1;
      if (darkness > 0.35) level = 2;
      if (darkness > 0.55) level = 3;
      if (darkness > 0.75) level = 4;

      if (level === 0) continue;

      var x0 = cx - half;
      var y0 = cy - half;
      var x1 = cx + half;
      var y1 = cy + half;

      ctx.beginPath();
      if (level >= 1) { ctx.moveTo(x0, cy); ctx.lineTo(x1, cy); }
      if (level >= 2) { ctx.moveTo(cx, y0); ctx.lineTo(cx, y1); }
      if (level >= 3) { ctx.moveTo(x0, y1); ctx.lineTo(x1, y0); }
      if (level >= 4) { ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); }
      ctx.stroke();
    }
  }
}

// ── OX (Circles + Crosses) ──
// Circles for lighter areas, crosses for darker areas, both overlaid at mid-tones.
// Two distinct tactile textures that encode brightness.
function renderOX(gray, w, h, params) {
  var adjusted = adjustPixels(gray, params);
  var spacing = params.spacing;
  var half = Math.floor(spacing / 2);
  var maxR = spacing * 0.42;

  output.width = w;
  output.height = h;

  var fg, bg;
  if (params.invert) {
    bg = '#000'; fg = '#fff';
  } else {
    bg = '#fff'; fg = '#000';
  }
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  for (var cy = half; cy < h; cy += spacing) {
    for (var cx = half; cx < w; cx += spacing) {
      var b = adjusted[cy * w + cx];
      var darkness = params.invert ? (b / 255) : (1 - b / 255);
      if (darkness < 0.05) continue;

      var r = maxR * darkness;

      if (darkness <= 0.5) {
        // Light areas: circle only, size grows with darkness
        var circR = r * 2;
        ctx.fillStyle = fg;
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(0.8, circR), 0, Math.PI * 2);
        ctx.fill();
      } else if (darkness <= 0.75) {
        // Mid areas: circle + cross overlaid
        ctx.strokeStyle = fg;
        ctx.lineWidth = Math.max(1, spacing * 0.1);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
        var t = r * 0.3;
        ctx.fillStyle = fg;
        ctx.fillRect(cx - r, cy - t, r * 2, t * 2);
        ctx.fillRect(cx - t, cy - r, t * 2, r * 2);
      } else {
        // Dark areas: bold cross + filled circle
        ctx.fillStyle = fg;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
        ctx.fill();
        var t2 = r * 0.35;
        ctx.fillRect(cx - r, cy - t2, r * 2, t2 * 2);
        ctx.fillRect(cx - t2, cy - r, t2 * 2, r * 2);
      }
    }
  }
}

// ── Engrave ──
// Continuous diagonal lines with variable thickness based on brightness.
// Produces an engraving / banknote etching look.
function renderEngrave(gray, w, h, params) {
  var adjusted = adjustPixels(gray, params);
  var spacing = params.spacing;

  output.width = w;
  output.height = h;

  if (params.invert) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#fff';
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#000';
  }

  ctx.lineCap = 'butt';

  // Draw diagonal lines (top-left to bottom-right direction)
  // Each line runs from one edge to the opposite, spaced apart by 'spacing'.
  // Line thickness varies along the line based on local brightness.
  var maxThick = spacing * 0.85;
  var step = Math.max(2, Math.floor(spacing * 0.5));

  // Lines go from top-right to bottom-left (perpendicular offset along y = -x direction)
  for (var d = -h; d < w + h; d += spacing) {
    ctx.beginPath();
    var started = false;
    for (var x = Math.max(0, d); x < Math.min(w, d + h); x += step) {
      var y = x - d;
      if (y < 0 || y >= h) continue;
      var b = adjusted[y * w + x];
      var darkness = params.invert ? (b / 255) : (1 - b / 255);
      var thick = maxThick * darkness;
      if (thick < 0.3) {
        if (started) { ctx.stroke(); ctx.beginPath(); started = false; }
        continue;
      }
      ctx.lineWidth = thick;
      if (!started) {
        ctx.moveTo(x, y);
        started = true;
      } else {
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      }
    }
    if (started) ctx.stroke();
  }
  ctx.lineCap = 'butt';
}

// ── Stipple ──
// Random dot placement with density proportional to darkness.
// Uses a seeded PRNG so output is deterministic for the same image.
function renderStipple(gray, w, h, params) {
  var adjusted = adjustPixels(gray, params);
  var spacing = params.spacing;

  output.width = w;
  output.height = h;

  if (params.invert) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#000';
  }

  // Dot radius scales with spacing
  var dotRadius = Math.max(1, spacing * 0.3);
  // Number of candidate dots — more candidates = denser coverage
  var area = w * h;
  var maxDots = Math.round(area / (spacing * spacing) * 3);

  // Simple seeded PRNG (mulberry32) for deterministic output
  var seed = 12345;
  function rand() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }

  for (var i = 0; i < maxDots; i++) {
    var x = Math.floor(rand() * w);
    var y = Math.floor(rand() * h);
    var b = adjusted[y * w + x];
    var darkness = params.invert ? (b / 255) : (1 - b / 255);
    // Accept dot with probability proportional to darkness
    if (rand() < darkness) {
      ctx.beginPath();
      ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Algorithm toggle buttons ──
document.querySelectorAll('#algoRow .toggle-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#algoRow .toggle-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentAlgo = btn.dataset.algo;
    // Show shape row only for dithertone
    document.getElementById('shapeRow').style.display = currentAlgo === 'dithertone' ? 'flex' : 'none';
    updateSliderVisibility();
    onParamChange();
  });
});

// ── Shape toggle buttons ──
document.querySelectorAll('#shapeRow .toggle-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#shapeRow .toggle-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentShape = btn.dataset.shape;
    onParamChange();
  });
});

// ── Load image from file input ──
function loadImage(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var maxDim = 800;
      var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      sourceW = Math.round(img.width * scale);
      sourceH = Math.round(img.height * scale);

      var tmp = document.createElement('canvas');
      tmp.width = sourceW;
      tmp.height = sourceH;
      var tmpCtx = tmp.getContext('2d', { willReadFrequently: true });
      tmpCtx.drawImage(img, 0, 0, sourceW, sourceH);
      var imageData = tmpCtx.getImageData(0, 0, sourceW, sourceH);
      var data = imageData.data;

      sourceGray = new Uint8Array(sourceW * sourceH);
      for (var i = 0; i < sourceGray.length; i++) {
        var idx = i * 4;
        sourceGray[i] = Math.round(
          0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2]
        );
      }

      enterPhotoMode();
      render(sourceGray, sourceW, sourceH, getParams());
      showStatus('Photo loaded. Adjust sliders and save.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function enterPhotoMode() {
  liveMode = false;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('editor').classList.remove('hidden');
  document.getElementById('photoButtons').classList.remove('hidden');
  document.getElementById('liveButtons').classList.add('hidden');
}

function enterLiveMode() {
  liveMode = true;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('editor').classList.remove('hidden');
  document.getElementById('photoButtons').classList.add('hidden');
  document.getElementById('liveButtons').classList.remove('hidden');
}

function returnToStart() {
  stopLive();
  sourceGray = null;
  inverted = false;
  currentShape = 'circle';
  currentAlgo = 'dithertone';
  liveMode = false;

  // Reset UI
  document.getElementById('invertBtn').textContent = 'Invert';
  document.getElementById('liveInvertBtn').textContent = 'Invert';
  document.querySelectorAll('#shapeRow .toggle-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('#shapeRow .toggle-btn[data-shape="circle"]').classList.add('active');
  document.querySelectorAll('#algoRow .toggle-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('#algoRow .toggle-btn[data-algo="dithertone"]').classList.add('active');
  document.getElementById('shapeRow').style.display = 'flex';
  document.getElementById('spacingRow').classList.remove('hidden');
  document.getElementById('scaleRow').classList.add('hidden');
  document.getElementById('editor').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('cameraInput').value = '';
  document.getElementById('libraryInput').value = '';
}

// ── Live webcam ──
function getGrayscaleFromVideo(w, h) {
  srcCanvas.width = w;
  srcCanvas.height = h;
  srcCtx.drawImage(video, 0, 0, w, h);
  var imageData = srcCtx.getImageData(0, 0, w, h);
  var data = imageData.data;
  var gray = new Uint8Array(w * h);
  for (var i = 0; i < gray.length; i++) {
    var idx = i * 4;
    gray[i] = Math.round(0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2]);
  }
  return gray;
}

function liveRenderLoop() {
  if (!liveRunning) return;
  var vw = video.videoWidth;
  var vh = video.videoHeight;
  if (vw > 0 && vh > 0) {
    var scale = Math.min(1, 480 / Math.max(vw, vh));
    var w = Math.round(vw * scale);
    var h = Math.round(vh * scale);
    var gray = getGrayscaleFromVideo(w, h);
    render(gray, w, h, getParams());
  }
  requestAnimationFrame(liveRenderLoop);
}

function startLive() {
  facingMode = document.getElementById('cameraSelect').value;
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  }).then(function(stream) {
    video.srcObject = stream;
    video.play();
    liveRunning = true;
    enterLiveMode();
    showStatus('Camera started');
    liveRenderLoop();
  }).catch(function(err) {
    showStatus('Camera error: ' + err.message);
  });
}

function stopLive() {
  liveRunning = false;
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(function(t) { t.stop(); });
    video.srcObject = null;
  }
}

function flipCamera() {
  stopLive();
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  document.getElementById('cameraSelect').value = facingMode;
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  }).then(function(stream) {
    video.srcObject = stream;
    video.play();
    liveRunning = true;
    showStatus('Camera flipped');
    liveRenderLoop();
  }).catch(function(err) {
    showStatus('Camera error: ' + err.message);
  });
}

function captureLiveFrame() {
  if (!video.srcObject) return;
  var vw = video.videoWidth;
  var vh = video.videoHeight;
  if (vw === 0) return;
  var maxDim = 800;
  var scale = Math.min(1, maxDim / Math.max(vw, vh));
  sourceW = Math.round(vw * scale);
  sourceH = Math.round(vh * scale);
  sourceGray = getGrayscaleFromVideo(sourceW, sourceH);

  stopLive();
  enterPhotoMode();
  render(sourceGray, sourceW, sourceH, getParams());
  showStatus('Frame captured. Adjust and save.');
}

// ── Save / Bracket ──
function savePNG(suffix) {
  var ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  var name = suffix ? 'dither_' + suffix + '_' + ts + '.png' : 'dither_' + ts + '.png';
  var dataURL = output.toDataURL('image/png');

  var link = document.createElement('a');
  link.download = name;
  link.href = dataURL;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showStatus('Saved: ' + name);
}

function bracketCapture(gray, w, h) {
  if (!gray) return;
  var baseParams = getParams();
  var baseSpacing = baseParams.spacing;
  var variants = [
    { label: 'tight', spacing: Math.max(2, Math.round(baseSpacing * 0.6)) },
    { label: 'medium', spacing: baseSpacing },
    { label: 'loose', spacing: Math.min(30, Math.round(baseSpacing * 1.6)) },
  ];
  variants.forEach(function(v) {
    var p = {};
    for (var k in baseParams) p[k] = baseParams[k];
    p.spacing = v.spacing;
    render(gray, w, h, p);
    savePNG(v.label);
  });
  render(gray, w, h, baseParams);
  showStatus('Bracket: 3 variants saved');
}

function liveBracket() {
  if (!video.srcObject) return;
  var vw = video.videoWidth;
  var vh = video.videoHeight;
  if (vw === 0) return;
  var scale = Math.min(1, 640 / Math.max(vw, vh));
  var w = Math.round(vw * scale);
  var h = Math.round(vh * scale);
  var gray = getGrayscaleFromVideo(w, h);
  bracketCapture(gray, w, h);
}

function showStatus(msg) {
  statusEl.textContent = msg;
  setTimeout(function() { statusEl.textContent = ''; }, 4000);
}

function toggleInvert() {
  inverted = !inverted;
  var label = inverted ? 'Invert: ON' : 'Invert';
  document.getElementById('invertBtn').textContent = label;
  document.getElementById('liveInvertBtn').textContent = label;
  if (sourceGray && !liveMode) render(sourceGray, sourceW, sourceH, getParams());
}

// ── Button handlers ──
document.getElementById('takePhotoBtn').addEventListener('click', function() {
  document.getElementById('cameraInput').click();
});
document.getElementById('choosePhotoBtn').addEventListener('click', function() {
  document.getElementById('libraryInput').click();
});
document.getElementById('cameraInput').addEventListener('change', function(e) {
  if (e.target.files.length > 0) loadImage(e.target.files[0]);
});
document.getElementById('libraryInput').addEventListener('change', function(e) {
  if (e.target.files.length > 0) loadImage(e.target.files[0]);
});

// Photo mode buttons
document.getElementById('saveBtn').addEventListener('click', function() { savePNG(); });
document.getElementById('bracketBtn').addEventListener('click', function() {
  bracketCapture(sourceGray, sourceW, sourceH);
});
document.getElementById('invertBtn').addEventListener('click', toggleInvert);
document.getElementById('newBtn').addEventListener('click', returnToStart);

// Live mode buttons
document.getElementById('liveBtn').addEventListener('click', startLive);
document.getElementById('captureBtn').addEventListener('click', captureLiveFrame);
document.getElementById('liveBracketBtn').addEventListener('click', liveBracket);
document.getElementById('liveInvertBtn').addEventListener('click', toggleInvert);
document.getElementById('flipBtn').addEventListener('click', flipCamera);
document.getElementById('stopBtn').addEventListener('click', returnToStart);

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === ' ') { e.preventDefault(); if (liveMode) captureLiveFrame(); else savePNG(); }
  else if (e.key === 'b') { if (liveMode) liveBracket(); else bracketCapture(sourceGray, sourceW, sourceH); }
  else if (e.key === 'i') toggleInvert();
  else if (e.key === '=' || e.key === '+') { spacingSlider.value = Math.min(30, parseInt(spacingSlider.value) + 1); onParamChange(); }
  else if (e.key === '-') { spacingSlider.value = Math.max(2, parseInt(spacingSlider.value) - 1); onParamChange(); }
  else if (e.key === ']') { gammaSlider.value = Math.min(4, parseFloat(gammaSlider.value) + 0.1).toFixed(1); onParamChange(); }
  else if (e.key === '[') { gammaSlider.value = Math.max(0.2, parseFloat(gammaSlider.value) - 0.1).toFixed(1); onParamChange(); }
});
</script>
