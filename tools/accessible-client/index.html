<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rhino Harness</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 1rem;
  line-height: 1.5;
  color: #e8e8e8;
  background: #1a1a2e;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: #0f1a30;
  border-bottom: 2px solid #4a6fa5;
  padding: 0.4rem 1rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}
.header h1 { font-size: 1rem; font-weight: 600; color: #a0c4ff; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.dot.on { background: #4caf50; }
.dot.off { background: #f44336; }
.header .status { font-size: 0.85rem; color: #6a9fd8; }

/* Layout */
.layout { display: flex; flex: 1; min-height: 0; gap: 2px; }
.pane {
  display: flex;
  flex-direction: column;
  background: #16213e;
  border: 1px solid #2a3f5f;
  min-width: 0;
  overflow: hidden;
}
.pane-head {
  background: #0f1a30;
  padding: 0.35rem 0.75rem;
  border-bottom: 1px solid #2a3f5f;
  font-weight: 600;
  color: #a0c4ff;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.pane-body { flex: 1; overflow-y: auto; padding: 0.5rem 0.75rem; min-height: 0; }

#terminal-pane { flex: 5; }
#data-pane { flex: 3; }

/* Terminal */
#term-log {
  font-family: 'Cascadia Code', Consolas, monospace;
  font-size: 0.85rem;
  white-space: pre-wrap;
  word-break: break-word;
  padding: 0.5rem;
  background: #0a0f1e;
  border: 1px solid #2a3f5f;
  border-radius: 3px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.t-in { color: #7eb8ff; }
.t-ok { color: #4caf50; }
.t-err { color: #f44336; }
.t-info { color: #a0c4ff; }

.input-row {
  display: flex;
  gap: 0.5rem;
  padding: 0.5rem;
  background: #0f1a30;
  border-top: 1px solid #2a3f5f;
  flex-shrink: 0;
}
#term-input {
  flex: 1;
  font-family: 'Cascadia Code', Consolas, monospace;
  font-size: 0.9rem;
  padding: 0.4rem 0.6rem;
  border: 2px solid #4a6fa5;
  border-radius: 4px;
  background: #0a0f1e;
  color: #e8e8e8;
}
#term-input:focus { border-color: #7eb8ff; outline: 2px solid #7eb8ff; outline-offset: 1px; }
#term-input::placeholder { color: #4a6fa5; }

/* Data pane */
.tab-bar {
  display: flex;
  background: #0a0f1e;
  border-bottom: 1px solid #2a3f5f;
  flex-shrink: 0;
}
.tab-btn {
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.3rem 0.75rem;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: #6a9fd8;
  cursor: pointer;
  margin: 0;
  border-radius: 0;
}
.tab-btn:hover { color: #a0c4ff; }
.tab-btn:focus { outline: 2px solid #7eb8ff; outline-offset: -2px; }
.tab-btn[aria-selected="true"] { color: #e8e8e8; border-bottom-color: #7eb8ff; background: #16213e; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

dl { margin: 0.25rem 0; }
dt { color: #8aa4c8; font-weight: 600; font-size: 0.85rem; margin-top: 0.4rem; }
dd { color: #e8e8e8; margin-left: 0; padding-left: 0.75rem; font-size: 0.9rem; }

table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 0.25rem 0; }
th { text-align: left; color: #8aa4c8; font-weight: 600; padding: 0.2rem 0.5rem; border-bottom: 1px solid #2a3f5f; }
td { padding: 0.2rem 0.5rem; border-bottom: 1px solid #1a2a4a; }

.btn {
  font-size: 0.8rem;
  padding: 0.2rem 0.6rem;
  background: #2a3f5f;
  border: 1px solid #4a6fa5;
  color: #a0c4ff;
  border-radius: 3px;
  cursor: pointer;
  margin: 0.15rem;
}
.btn:hover { background: #4a6fa5; }
.btn:focus { outline: 2px solid #7eb8ff; }

.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0f1e; }
::-webkit-scrollbar-thumb { background: #4a6fa5; border-radius: 3px; }
</style>
</head>
<body>

<header class="header">
  <h1>Rhino Harness</h1>
  <span class="status"><span id="dot-srv" class="dot off"></span><span id="lbl-srv">Server: off</span></span>
  <span class="status"><span id="dot-rh" class="dot off"></span><span id="lbl-rh">Rhino: off</span></span>
</header>

<div class="layout">

<!-- Terminal -->
<section class="pane" id="terminal-pane">
  <div class="pane-head">Terminal</div>
  <div class="pane-body" style="display:flex;flex-direction:column;">
    <div id="term-log" role="log" aria-live="polite" aria-label="Terminal output"></div>
  </div>
  <div class="input-row">
    <label for="term-input" class="sr-only">Command</label>
    <input type="text" id="term-input" placeholder="Type a message..." autocomplete="off">
  </div>
</section>

<!-- Data -->
<section class="pane" id="data-pane">
  <div class="pane-head">Inspector</div>
  <div class="tab-bar" role="tablist">
    <button class="tab-btn" role="tab" aria-selected="true" aria-controls="tab-rhino" id="btn-rhino">Rhino</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-layers" id="btn-layers">Layers</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-scripts" id="btn-scripts">Scripts</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-session" id="btn-session">Session</button>
  </div>
  <div class="pane-body">
    <div class="tab-panel active" role="tabpanel" id="tab-rhino">
      <dl>
        <dt>Connection</dt><dd id="rh-conn">Unknown</dd>
        <dt>Objects</dt><dd id="rh-obj">-</dd>
        <dt>Layers</dt><dd id="rh-lay">-</dd>
        <dt>Bounds</dt><dd id="rh-bb">-</dd>
        <dt>Last rebuild</dt><dd id="rh-time">-</dd>
      </dl>
      <div style="margin-top:0.5rem">
        <button class="btn" id="btn-refresh">Refresh</button>
        <button class="btn" id="btn-zoom">Zoom Fit</button>
      </div>
    </div>
    <div class="tab-panel" role="tabpanel" id="tab-layers">
      <div id="layer-list"><p>Press Refresh to load.</p></div>
    </div>
    <div class="tab-panel" role="tabpanel" id="tab-scripts">
      <div id="script-list"><p>No scripts loaded.</p></div>
    </div>
    <div class="tab-panel" role="tabpanel" id="tab-session">
      <div id="session-log"><p>No session log.</p></div>
    </div>
  </div>
</section>

</div>

<script>
(function() {
  "use strict";

  var termLog = document.getElementById("term-log");
  var termInput = document.getElementById("term-input");
  var dotSrv = document.getElementById("dot-srv");
  var lblSrv = document.getElementById("lbl-srv");
  var dotRh = document.getElementById("dot-rh");
  var lblRh = document.getElementById("lbl-rh");

  var cmdHistory = [];
  var histIdx = -1;

  function print(text, cls) {
    var d = document.createElement("div");
    d.className = cls || "";
    d.textContent = text;
    termLog.appendChild(d);
    termLog.scrollTop = termLog.scrollHeight;
  }

  function classify(text) {
    if (!text) return "";
    if (text.startsWith("OK:")) return "t-ok";
    if (text.startsWith("ERROR:") || text.startsWith("OFFLINE:")) return "t-err";
    return "t-info";
  }

  // SSE
  function connectSSE() {
    var src = new EventSource("/events");
    src.onopen = function() {
      dotSrv.className = "dot on";
      lblSrv.textContent = "Server: on";
    };
    src.onerror = function() {
      dotSrv.className = "dot off";
      lblSrv.textContent = "Server: off";
    };
    src.onmessage = function(e) {
      var data;
      try { data = JSON.parse(e.data); } catch(x) { return; }
      if (data.type === "reply") {
        var lines = (data.text || "").split("\n");
        for (var i = 0; i < lines.length; i++) {
          print(lines[i], classify(lines[i]));
        }
        if (data.text && data.text.indexOf("ONLINE") >= 0) {
          dotRh.className = "dot on";
          lblRh.textContent = "Rhino: on";
        }
      } else if (data.type === "permission") {
        addPermission(data.request_id, data.tool_name, data.description);
      } else if (data.type === "inventory") {
        renderLayers(data.objects || []);
      }
    };
  }

  function addPermission(rid, tool, desc) {
    var d = document.createElement("div");
    d.style.cssText = "border:1px solid #d4a017;padding:0.4rem;margin:0.2rem 0;background:#2a1a00;color:#ffd666;border-radius:3px;";
    d.innerHTML = esc(tool) + ": " + esc(desc) + " " +
      '<button class="btn" onclick="perm(\'' + esc(rid) + '\',\'allow\',this)">Allow</button>' +
      '<button class="btn" onclick="perm(\'' + esc(rid) + '\',\'deny\',this)">Deny</button>';
    termLog.appendChild(d);
    termLog.scrollTop = termLog.scrollHeight;
  }

  window.perm = function(rid, behavior, btn) {
    fetch("/permission", {
      method: "POST",
      headers: {"Content-Type": "application/json", "X-Sender": "local"},
      body: JSON.stringify({request_id: rid, behavior: behavior})
    }).catch(function(){});
    btn.parentElement.innerHTML = behavior === "allow" ? "Allowed" : "Denied";
  };

  function send(text) {
    text = text.trim();
    if (!text) return;
    cmdHistory.push(text);
    histIdx = cmdHistory.length;
    print("> " + text, "t-in");
    fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json", "X-Sender": "local"},
      body: JSON.stringify({text: text, sender: "local"})
    }).catch(function() { print("ERROR: Send failed", "t-err"); });
  }

  // Tabs
  var tabs = document.querySelectorAll(".tab-btn");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener("click", function() {
      var id = this.getAttribute("aria-controls");
      for (var j = 0; j < tabs.length; j++) {
        tabs[j].setAttribute("aria-selected", "false");
        document.getElementById(tabs[j].getAttribute("aria-controls")).classList.remove("active");
      }
      this.setAttribute("aria-selected", "true");
      document.getElementById(id).classList.add("active");
    });
  }

  document.getElementById("btn-refresh").addEventListener("click", function() {
    send("Check Rhino status. Call rhino_status, rhino_layers, and rhino_bounds. Report results.");
  });
  document.getElementById("btn-zoom").addEventListener("click", function() {
    send("Run ZoomExtents in Rhino.");
  });

  function renderLayers(objects) {
    if (!objects.length) {
      document.getElementById("layer-list").innerHTML = "<p>No objects.</p>";
      return;
    }
    var map = {};
    for (var i = 0; i < objects.length; i++) {
      var l = objects[i].layer || "Default";
      map[l] = (map[l] || 0) + 1;
    }
    var html = "<table><tr><th>Layer</th><th>Objects</th></tr>";
    var keys = Object.keys(map).sort();
    for (var k = 0; k < keys.length; k++) {
      html += "<tr><td>" + esc(keys[k]) + "</td><td>" + map[keys[k]] + "</td></tr>";
    }
    html += "</table>";
    document.getElementById("layer-list").innerHTML = html;
    document.getElementById("rh-obj").textContent = objects.length + " objects";
    document.getElementById("rh-lay").textContent = keys.length + " layers";
    dotRh.className = "dot on";
    lblRh.textContent = "Rhino: on";
    document.getElementById("rh-conn").textContent = "Connected";
  }

  function esc(s) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
  }

  termInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); send(termInput.value); termInput.value = ""; }
    else if (e.key === "ArrowUp") { e.preventDefault(); if (histIdx > 0) { histIdx--; termInput.value = cmdHistory[histIdx]; } }
    else if (e.key === "ArrowDown") { e.preventDefault(); if (histIdx < cmdHistory.length - 1) { histIdx++; termInput.value = cmdHistory[histIdx]; } else { histIdx = cmdHistory.length; termInput.value = ""; } }
  });

  document.addEventListener("keydown", function(e) {
    if (e.altKey && e.key === "1") { e.preventDefault(); termInput.focus(); }
    if (e.altKey && e.key === "2") { e.preventDefault(); document.getElementById("btn-rhino").focus(); }
  });

  connectSSE();
  print("Rhino Harness ready. Type a message to start.", "t-ok");
})();
</script>
</body>
</html>
