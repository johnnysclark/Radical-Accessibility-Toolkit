<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accessible Rhino Modeling Interface</title>
<style>
/* ============================================================
   REBEL TACTICAL CONSOLE — design tokens
   Amber + white on pure black. Neo-brutalist geometry.
   AAA contrast everywhere. Zero motion.
   ============================================================ */
:root {
  /* palette */
  --bg:           #000000;
  --ink:          #ffffff;
  --ink-dim:      #c8c8c8;
  --amber:        #ffb000;
  --amber-hot:    #ffc933;
  --amber-deep:   #8a5d00;
  --cyan:         #7df9ff;
  --border:       #ffffff;
  --accent:       var(--amber);

  /* spacing scale */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.5rem;
  --space-6: 2rem;

  /* border widths */
  --bw-thin:  1px;
  --bw:       2px;
  --bw-thick: 3px;
  --bw-focus: 3px;

  /* hard offset shadow (no blur — brutalism) */
  --shadow-hard:  6px 6px 0 var(--amber);
  --shadow-soft:  3px 3px 0 var(--amber-deep);

  /* type stacks */
  --font-mono: "JetBrains Mono", "IBM Plex Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --font-body: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ============================================================
   Body — black canvas, faint tactical grid, white prose.
   ============================================================ */
body {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.6;
  color: var(--ink);
  background-color: var(--bg);
  background-image:
    repeating-linear-gradient(0deg,   transparent 0 39px, rgba(255, 176, 0, 0.05) 39px 40px),
    repeating-linear-gradient(90deg,  transparent 0 39px, rgba(255, 176, 0, 0.05) 39px 40px);
  min-height: 100vh;
}

a {
  color: var(--amber);
  text-decoration: underline;
  text-underline-offset: 0.2em;
  text-decoration-thickness: var(--bw);
}
a:hover { color: var(--amber-hot); }
a:focus-visible {
  outline: var(--bw-focus) solid var(--amber);
  outline-offset: 2px;
}

/* ============================================================
   Header — tactical brand mark
   ============================================================ */
.app-header {
  background: var(--bg);
  border-bottom: var(--bw-thick) solid var(--amber);
  padding: var(--space-3) var(--space-5);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  position: relative;
}
/* corner bracket on header (top-left) */
.app-header::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 14px; height: 14px;
  border-top: var(--bw-thick) solid var(--ink);
  border-left: var(--bw-thick) solid var(--ink);
}
/* corner bracket on header (top-right) */
.app-header::after {
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: 14px; height: 14px;
  border-top: var(--bw-thick) solid var(--ink);
  border-right: var(--bw-thick) solid var(--ink);
}
.app-header h1 {
  font-family: var(--font-mono);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--amber);
  margin: 0;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.app-header h1::before { content: "[ "; color: var(--ink); }
.app-header h1::after  { content: " ] // TACTICAL CONSOLE"; color: var(--ink-dim); letter-spacing: 0.15em; }
.app-header .app-status {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--cyan);
  margin-left: auto;
  padding: var(--space-1) var(--space-2);
  border: var(--bw) solid var(--cyan);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ============================================================
   Layout
   ============================================================ */
.layout {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-5);
  padding: var(--space-5);
  max-width: 100rem;
  margin: 0 auto;
}

/* ============================================================
   Panes — tactical readouts with corner brackets
   ============================================================ */
.pane {
  flex: 1 1 30rem;
  min-width: 20rem;
  background: var(--bg);
  border: var(--bw) solid var(--border);
  padding: var(--space-5);
  position: relative;
  box-shadow: var(--shadow-hard);
}
/* bottom-left bracket */
.pane::before {
  content: "";
  position: absolute;
  bottom: -1px; left: -1px;
  width: 16px; height: 16px;
  border-bottom: var(--bw-thick) solid var(--amber);
  border-left:   var(--bw-thick) solid var(--amber);
  pointer-events: none;
}
/* bottom-right bracket */
.pane::after {
  content: "";
  position: absolute;
  bottom: -1px; right: -1px;
  width: 16px; height: 16px;
  border-bottom: var(--bw-thick) solid var(--amber);
  border-right:  var(--bw-thick) solid var(--amber);
  pointer-events: none;
}

h1.pane-title {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: var(--bw) dashed var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.16em;
}
h1.pane-title::before { content: "// "; color: var(--amber); }

h2 {
  font-family: var(--font-mono);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--amber);
  margin-top: var(--space-4);
  margin-bottom: var(--space-2);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
h2::before { content: "> "; color: var(--ink); }

/* ============================================================
   Labels
   ============================================================ */
label {
  display: block;
  font-family: var(--font-mono);
  font-weight: 700;
  margin-top: var(--space-3);
  color: var(--ink);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ============================================================
   Inputs
   ============================================================ */
input[type="text"],
input[type="number"] {
  font-family: var(--font-mono);
  font-size: 1rem;
  padding: var(--space-3) var(--space-3);
  min-height: 44px;
  border: var(--bw) solid var(--border);
  background: var(--bg);
  color: var(--ink);
  width: 100%;
  max-width: 22rem;
  transition: border-color 120ms linear, color 120ms linear;
}
input[type="text"]:hover,
input[type="number"]:hover {
  border-color: var(--amber);
}
input[type="text"]:focus,
input[type="number"]:focus,
input[type="text"]:focus-visible,
input[type="number"]:focus-visible {
  border-color: var(--amber);
  outline: var(--bw-focus) solid var(--amber);
  outline-offset: 2px;
  color: var(--amber-hot);
}
input[type="number"] { max-width: 9rem; }
input::placeholder { color: var(--ink-dim); opacity: 0.7; font-style: italic; }

/* ============================================================
   Buttons — heavy mono labels with amber halo on focus
   ============================================================ */
button {
  font-family: var(--font-mono);
  font-size: 0.95rem;
  font-weight: 700;
  padding: var(--space-3) var(--space-5);
  min-height: 44px;
  min-width: 44px;
  border: var(--bw) solid var(--border);
  background: var(--bg);
  color: var(--ink);
  cursor: pointer;
  margin-top: var(--space-2);
  margin-right: var(--space-2);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  box-shadow: var(--shadow-soft);
  transition: background-color 120ms linear, color 120ms linear, border-color 120ms linear;
}
button:hover {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
button:focus,
button:focus-visible {
  outline: var(--bw-focus) solid var(--amber);
  outline-offset: 2px;
  background: var(--bg);
  color: var(--amber-hot);
  border-color: var(--amber);
}
button:active {
  background: var(--amber);
  color: var(--bg);
  border-color: var(--amber);
  box-shadow: none;
}

/* ============================================================
   Chat list — black readout with amber baseline ticks
   ============================================================ */
.chat-list {
  list-style: none;
  padding: var(--space-3);
  margin: var(--space-3) 0;
  max-height: 30rem;
  overflow-y: auto;
  background: var(--bg);
  border: var(--bw) solid var(--border);
}
.chat-list li {
  margin-bottom: var(--space-2);
  padding: var(--space-2) var(--space-3);
  line-height: 1.55;
  border-left: var(--bw-thick) solid transparent;
}
.chat-list li:nth-child(odd) {
  background: rgba(255, 176, 0, 0.04);
}
.chat-list li:has(.chat-msg-you)    { border-left-color: var(--amber); }
.chat-list li:has(.chat-msg-claude) { border-left-color: var(--ink); }
.chat-msg-you {
  color: var(--amber);
  font-weight: 700;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.chat-msg-claude {
  color: var(--ink);
  font-weight: 700;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ============================================================
   Chat input row
   ============================================================ */
.chat-input-row {
  display: flex;
  gap: var(--space-2);
  align-items: stretch;
  margin-top: var(--space-3);
}
.chat-input-row input { flex: 1; max-width: none; }

/* ============================================================
   Status — monospace tactical readout
   ============================================================ */
.status {
  font-family: var(--font-mono);
  font-weight: 700;
  margin-top: var(--space-2);
  color: var(--cyan);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.status::before { content: ">> "; color: var(--amber); }

/* ============================================================
   Permission prompts — high-priority amber alert
   ============================================================ */
.permission-prompt {
  border: var(--bw-thick) solid var(--amber);
  padding: var(--space-3);
  margin: var(--space-3) 0;
  background: var(--bg);
  color: var(--amber-hot);
  font-family: var(--font-mono);
  box-shadow: var(--shadow-hard);
  position: relative;
}
.permission-prompt::before {
  content: "[!] PERMISSION REQUIRED";
  display: block;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: var(--space-2);
  border-bottom: var(--bw) dashed var(--amber);
  padding-bottom: var(--space-1);
}
.permission-prompt button {
  background: var(--bg);
  border-color: var(--amber);
  color: var(--amber);
}
.permission-prompt button:hover {
  background: var(--amber);
  color: var(--bg);
  border-color: var(--amber);
}

/* ============================================================
   Fieldsets — object cards in navigator
   ============================================================ */
fieldset {
  border: var(--bw) solid var(--border);
  padding: var(--space-3);
  margin-bottom: var(--space-3);
  background: var(--bg);
  position: relative;
}
fieldset::before {
  content: "";
  position: absolute;
  top: -1px; right: -1px;
  width: 10px; height: 10px;
  border-top:   var(--bw) solid var(--amber);
  border-right: var(--bw) solid var(--amber);
}
legend {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--amber);
  padding: 0 var(--space-2);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.85rem;
}

/* ============================================================
   Property rows
   ============================================================ */
.prop-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  align-items: center;
  margin-top: var(--space-2);
}
.prop-row label {
  display: inline;
  margin-top: 0;
  margin-right: var(--space-2);
  font-weight: 700;
  color: var(--ink-dim);
  font-size: 0.8rem;
}
.prop-row input[type="number"] { width: 7rem; max-width: 7rem; }

/* ============================================================
   Modified indicator — non-color cue: thicker border + offset shadow
   ============================================================ */
.modified {
  outline: var(--bw-focus) solid var(--amber);
  outline-offset: 1px;
  background: rgba(255, 176, 0, 0.08);
  box-shadow: var(--shadow-hard);
  font-weight: 700;
}

/* ============================================================
   Summary / details (layer groups)
   ============================================================ */
details {
  margin-bottom: var(--space-2);
  border-left: var(--bw) solid var(--amber-deep);
  padding-left: var(--space-3);
}
details[open] { border-left-color: var(--amber); }
summary {
  cursor: pointer;
  padding: var(--space-2) 0;
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.9rem;
  list-style: none;
}
summary::-webkit-details-marker { display: none; }
summary::before {
  content: "[+] ";
  color: var(--amber);
  font-weight: 700;
}
details[open] > summary::before { content: "[-] "; }
summary:hover { color: var(--amber); }
summary:focus,
summary:focus-visible {
  outline: var(--bw-focus) solid var(--amber);
  outline-offset: 2px;
  color: var(--amber);
}

/* ============================================================
   Screen reader only
   ============================================================ */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

/* ============================================================
   Navigator actions
   ============================================================ */
.nav-actions {
  margin-bottom: var(--space-3);
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

/* ============================================================
   Scrollbar — tactical thumb
   ============================================================ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); border-left: var(--bw-thin) solid var(--amber-deep); }
::-webkit-scrollbar-thumb { background: var(--amber); border: var(--bw-thin) solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--amber-hot); }

/* ============================================================
   Stack panes on narrow viewports
   ============================================================ */
@media (max-width: 900px) {
  .layout { padding: var(--space-3); gap: var(--space-3); }
  .pane { flex-basis: 100%; min-width: 0; }
  .app-header { padding: var(--space-3); }
  .app-header .app-status { display: block; margin-left: 0; margin-top: var(--space-2); }
}
</style>
</head>
<body>

<header class="app-header" role="banner">
  <h1>Accessible Rhino</h1>
  <span id="app-connection-status" class="app-status" role="status">Connecting...</span>
</header>

<div class="layout">

<!-- Chat Pane -->
<main class="pane" id="chat-pane" aria-label="Chat">
<h1 class="pane-title">Chat</h1>

<div id="chat-status" class="status" role="status">Connecting...</div>

<ol id="chat-history" class="chat-list" aria-live="polite" aria-label="Chat history">
</ol>

<div class="chat-input-row">
  <label for="chat-input" class="sr-only">Message</label>
  <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
  <button type="button" id="chat-send" aria-label="Send message">Send</button>
</div>
</main>

<!-- Model Navigator Pane -->
<aside class="pane" id="nav-pane" aria-label="Model Navigator">
<h1 class="pane-title">Model Navigator</h1>

<div class="nav-actions">
  <button type="button" id="nav-refresh" aria-label="Refresh inventory">Refresh</button>
  <button type="button" id="nav-apply" aria-label="Apply changes to model">Apply Changes</button>
  <button type="button" id="nav-discard" aria-label="Discard all changes">Discard Changes</button>
</div>

<div id="nav-status" class="status" role="status"></div>

<div id="nav-tree" aria-label="Object tree">
  <p>No inventory loaded. Press Refresh or Alt+R.</p>
</div>
</aside>

</div>

<script>
(function() {
  "use strict";

  // -----------------------------------------------------------------------
  // Element references
  // -----------------------------------------------------------------------
  var chatHistory = document.getElementById("chat-history");
  var chatInput = document.getElementById("chat-input");
  var chatSend = document.getElementById("chat-send");
  var chatStatus = document.getElementById("chat-status");
  var navTree = document.getElementById("nav-tree");
  var navStatus = document.getElementById("nav-status");
  var navRefresh = document.getElementById("nav-refresh");
  var navApply = document.getElementById("nav-apply");
  var navDiscard = document.getElementById("nav-discard");

  // Track pending edits: object_id -> { property -> new_value }
  var pendingEdits = {};
  // Store inventory data for building edits
  var currentInventory = null;

  // -----------------------------------------------------------------------
  // SSE connection
  // -----------------------------------------------------------------------
  function connectSSE() {
    chatStatus.textContent = "Connecting...";
    var source = new EventSource("/events");

    source.onopen = function() {
      chatStatus.textContent = "Connected";
      appStatus.textContent = "Connected";
    };

    source.onerror = function() {
      chatStatus.textContent = "Disconnected. Retrying...";
      appStatus.textContent = "Disconnected";
    };

    source.onmessage = function(event) {
      var data;
      try {
        data = JSON.parse(event.data);
      } catch (e) {
        return;
      }

      if (data.type === "reply") {
        addChatMessage("Claude", data.text);
      } else if (data.type === "permission") {
        addPermissionPrompt(data.request_id, data.tool_name, data.description);
      } else if (data.type === "inventory") {
        renderInventoryFromObjects(data.objects || []);
      }
    };
  }

  // -----------------------------------------------------------------------
  // Chat functions
  // -----------------------------------------------------------------------
  var appStatus = document.getElementById("app-connection-status");

  function addChatMessage(sender, text) {
    var li = document.createElement("li");
    var label = document.createElement("span");
    label.className = sender === "You" ? "chat-msg-you" : "chat-msg-claude";
    label.textContent = sender + ": ";
    li.appendChild(label);
    li.appendChild(document.createTextNode(text));
    chatHistory.appendChild(li);
    chatHistory.scrollTop = chatHistory.scrollHeight;
    chatStatus.textContent = "Connected";
    appStatus.textContent = "Connected";
  }

  function addPermissionPrompt(requestId, toolName, description) {
    var li = document.createElement("li");
    li.className = "permission-prompt";

    var msg = document.createElement("span");
    msg.textContent = "Claude wants to use " + toolName + ". " + description + " ";
    li.appendChild(msg);

    var allowBtn = document.createElement("button");
    allowBtn.textContent = "Allow";
    allowBtn.setAttribute("aria-label", "Allow " + toolName);
    allowBtn.addEventListener("click", function() {
      handlePermission(requestId, "allow");
      li.textContent = "Allowed: " + toolName;
    });
    li.appendChild(allowBtn);

    var denyBtn = document.createElement("button");
    denyBtn.textContent = "Deny";
    denyBtn.setAttribute("aria-label", "Deny " + toolName);
    denyBtn.addEventListener("click", function() {
      handlePermission(requestId, "deny");
      li.textContent = "Denied: " + toolName;
    });
    li.appendChild(denyBtn);

    chatHistory.appendChild(li);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function sendChat() {
    var text = chatInput.value.trim();
    if (!text) return;

    addChatMessage("You", text);
    chatInput.value = "";
    chatStatus.textContent = "Waiting for response...";

    fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Sender": "local"
      },
      body: JSON.stringify({ text: text, sender: "local" })
    }).catch(function() {
      chatStatus.textContent = "ERROR: Failed to send message";
    });
  }

  function handlePermission(requestId, behavior) {
    fetch("/permission", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Sender": "local"
      },
      body: JSON.stringify({ request_id: requestId, behavior: behavior })
    }).catch(function() {
      chatStatus.textContent = "ERROR: Failed to send permission response";
    });
  }

  // -----------------------------------------------------------------------
  // Model Navigator functions
  // -----------------------------------------------------------------------
  function loadInventory() {
    navStatus.textContent = "Reading inventory from watcher...";
    fetch("/inventory").then(function(res) {
      return res.json();
    }).then(function(data) {
      if (data && data.layers) {
        // Watcher inventory format: { layers: { LAYER_NAME: [objects...] } }
        renderInventory(data);
      } else if (Array.isArray(data) && data.length > 0) {
        renderInventoryFromObjects(data);
      } else {
        navStatus.textContent = "No objects in inventory. Is the watcher running?";
      }
    }).catch(function() {
      navStatus.textContent = "ERROR: Failed to read inventory.";
    });
  }

  function renderInventoryFromObjects(objects) {
    if (!objects || objects.length === 0) {
      navTree.innerHTML = "<p>No objects in Rhino document.</p>";
      navStatus.textContent = "No objects found.";
      return;
    }

    // Group objects by layer
    var layerMap = {};
    for (var i = 0; i < objects.length; i++) {
      var obj = objects[i];
      var layer = obj.layer || "Default";
      if (!layerMap[layer]) layerMap[layer] = [];
      layerMap[layer].push(obj);
    }

    // Store for edit reference
    currentInventory = { layers: layerMap };
    pendingEdits = {};

    var layerNames = Object.keys(layerMap).sort();
    var html = "";

    for (var li = 0; li < layerNames.length; li++) {
      var layerName = layerNames[li];
      var layerObjects = layerMap[layerName];

      html += '<details open>';
      html += '<summary><h2 style="display:inline">' + escapeHtml(layerName) + ' (' + layerObjects.length + ' objects)</h2></summary>';

      for (var j = 0; j < layerObjects.length; j++) {
        html += renderObjectFromRhinoMCP(layerObjects[j]);
      }

      html += '</details>';
    }

    navTree.innerHTML = html;

    // Attach change listeners
    var inputs = navTree.querySelectorAll("input[type='number']");
    for (var k = 0; k < inputs.length; k++) {
      inputs[k].addEventListener("change", onPropertyChange);
    }

    navStatus.textContent = objects.length + " objects loaded.";
  }

  function renderObjectFromRhinoMCP(obj) {
    var name = obj.name || "unnamed";
    var typeName = obj.type || "Object";
    var id = obj.id || name;

    var html = '<fieldset data-object-id="' + escapeAttr(id) + '" data-object-name="' + escapeAttr(name) + '">';
    html += '<legend>' + escapeHtml(name) + ' (' + escapeHtml(typeName) + ')</legend>';

    // Position and size from bounding box
    var minX = 0, minY = 0, minZ = 0;
    var width = 0, height = 0, depth = 0;
    if (obj.bounding_box) {
      var bb = obj.bounding_box;
      if (bb.min) { minX = roundNum(bb.min[0]); minY = roundNum(bb.min[1]); minZ = roundNum(bb.min[2]); }
      if (bb.min && bb.max) {
        width = roundNum(bb.max[0] - bb.min[0]);
        height = roundNum(bb.max[1] - bb.min[1]);
        depth = roundNum(bb.max[2] - bb.min[2]);
      }
    }

    var prefix = "obj-" + escapeAttr(id).replace(/[^a-zA-Z0-9_-]/g, "_");

    html += '<div class="prop-row">';
    html += '<label for="' + prefix + '-px">Position X</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-px" data-prop="position_x" value="' + minX + '">';
    html += '<label for="' + prefix + '-py">Y</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-py" data-prop="position_y" value="' + minY + '">';
    html += '<label for="' + prefix + '-pz">Z</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-pz" data-prop="position_z" value="' + minZ + '">';
    html += '</div>';

    html += '<div class="prop-row">';
    html += '<label>Size: ' + width + ' x ' + height + ' x ' + depth + '</label>';
    html += '</div>';

    html += '</fieldset>';
    return html;
  }

  function renderInventory(data) {
    var layers = data.layers || {};
    var layerNames = Object.keys(layers);

    if (layerNames.length === 0) {
      navTree.innerHTML = "<p>No objects in inventory.</p>";
      return;
    }

    // Clear pending edits when re-rendering
    pendingEdits = {};
    var html = "";

    for (var i = 0; i < layerNames.length; i++) {
      var layerName = layerNames[i];
      var objects = layers[layerName];
      var count = objects ? objects.length : 0;

      html += '<details open>';
      html += '<summary><h2 style="display:inline">' + escapeHtml(layerName) + ' (' + count + ' objects)</h2></summary>';

      if (objects && objects.length > 0) {
        for (var j = 0; j < objects.length; j++) {
          var obj = objects[j];
          html += renderObject(obj);
        }
      } else {
        html += '<p>No objects in this layer.</p>';
      }

      html += '</details>';
    }

    navTree.innerHTML = html;

    // Attach change listeners to all number inputs in the navigator
    var inputs = navTree.querySelectorAll("input[type='number']");
    for (var k = 0; k < inputs.length; k++) {
      inputs[k].addEventListener("change", onPropertyChange);
    }
  }

  function renderObject(obj) {
    var name = obj.name || obj.id || "unnamed";
    var typeName = objectTypeName(obj.type);
    var id = obj.id || "";

    var html = '<fieldset data-object-id="' + escapeAttr(id) + '">';
    html += '<legend>' + escapeHtml(name) + ' (' + escapeHtml(typeName) + ')</legend>';

    // Position from bounding box min
    var minX = 0, minY = 0, minZ = 0;
    if (obj.min) {
      minX = roundNum(obj.min[0]);
      minY = roundNum(obj.min[1]);
      minZ = roundNum(obj.min[2]);
    }

    // Size from bounding box
    var width = 0, height = 0, depth = 0;
    if (obj.min && obj.max) {
      width = roundNum(obj.max[0] - obj.min[0]);
      height = roundNum(obj.max[1] - obj.min[1]);
      depth = roundNum(obj.max[2] - obj.min[2]);
    }

    // Unique field IDs
    var prefix = "obj-" + escapeAttr(id).replace(/[^a-zA-Z0-9_-]/g, "_");

    html += '<div class="prop-row">';
    html += '<label for="' + prefix + '-px">Position X</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-px" data-prop="position_x" value="' + minX + '">';
    html += '<label for="' + prefix + '-py">Y</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-py" data-prop="position_y" value="' + minY + '">';
    html += '<label for="' + prefix + '-pz">Z</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-pz" data-prop="position_z" value="' + minZ + '">';
    html += '</div>';

    html += '<div class="prop-row">';
    html += '<label for="' + prefix + '-w">Width</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-w" data-prop="width" value="' + width + '" readonly>';
    html += '<label for="' + prefix + '-h">Height</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-h" data-prop="height" value="' + height + '" readonly>';
    html += '<label for="' + prefix + '-d">Depth</label>';
    html += '<input type="number" step="0.01" id="' + prefix + '-d" data-prop="depth" value="' + depth + '" readonly>';
    html += '</div>';

    // Metadata (read-only display)
    if (obj.metadata) {
      var keys = Object.keys(obj.metadata);
      for (var m = 0; m < keys.length; m++) {
        if (keys[m] === "JIG_OWNER" || keys[m] === "JIG_SCHEMA") continue;
        html += '<div class="prop-row">';
        html += '<label for="' + prefix + '-meta-' + m + '">' + escapeHtml(keys[m]) + '</label>';
        html += '<input type="text" id="' + prefix + '-meta-' + m + '" value="' + escapeAttr(obj.metadata[keys[m]]) + '" readonly>';
        html += '</div>';
      }
    }

    html += '</fieldset>';
    return html;
  }

  function onPropertyChange(event) {
    var input = event.target;
    var fieldset = input.closest("fieldset");
    if (!fieldset) return;

    var objectId = fieldset.getAttribute("data-object-id");
    var prop = input.getAttribute("data-prop");
    var value = parseFloat(input.value);

    if (!objectId || !prop || isNaN(value)) return;

    // Mark as modified
    input.classList.add("modified");

    // Store the edit
    if (!pendingEdits[objectId]) {
      pendingEdits[objectId] = {};
    }
    pendingEdits[objectId][prop] = value;
  }

  function applyEdits() {
    var objectIds = Object.keys(pendingEdits);
    if (objectIds.length === 0) {
      navStatus.textContent = "No changes to apply.";
      return;
    }

    // Build edit list for the watcher
    var edits = [];
    for (var i = 0; i < objectIds.length; i++) {
      var oid = objectIds[i];
      var changes = pendingEdits[oid];

      // Check if position changed
      if ("position_x" in changes || "position_y" in changes || "position_z" in changes) {
        // Find original object for name and position
        var origObj = findObjectById(oid);
        var origMin = [0, 0, 0];
        if (origObj && origObj.bounding_box && origObj.bounding_box.min) {
          origMin = origObj.bounding_box.min;
        } else if (origObj && origObj.min) {
          origMin = origObj.min;
        }
        var objName = origObj ? (origObj.name || oid) : oid;

        edits.push({
          object_id: oid,
          object_name: objName,
          action: "move",
          params: {
            x: changes.position_x !== undefined ? changes.position_x : origMin[0],
            y: changes.position_y !== undefined ? changes.position_y : origMin[1],
            z: changes.position_z !== undefined ? changes.position_z : origMin[2]
          }
        });
      }
    }

    if (edits.length === 0) {
      navStatus.textContent = "No supported edits to apply.";
      return;
    }

    navStatus.textContent = "Applying " + edits.length + " edits...";

    fetch("/edit-direct", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Sender": "local"
      },
      body: JSON.stringify({ edits: edits })
    }).then(function(res) {
      return res.json();
    }).then(function(data) {
      if (data.ok) {
        navStatus.textContent = "Applied " + edits.length + " edits via watcher. Rhino rebuilds in ~0.5s.";
        pendingEdits = {};
        clearModifiedMarkers();
      } else {
        navStatus.textContent = "ERROR: Failed to apply edits.";
      }
    }).catch(function() {
      navStatus.textContent = "ERROR: Failed to send edits.";
    });
  }

  function discardEdits() {
    pendingEdits = {};
    clearModifiedMarkers();
    // Re-render from stored inventory to reset values
    if (currentInventory) {
      renderInventory(currentInventory);
    }
    navStatus.textContent = "Changes discarded.";
  }

  function findObjectById(id) {
    if (!currentInventory || !currentInventory.layers) return null;
    var layers = currentInventory.layers;
    var layerNames = Object.keys(layers);
    for (var i = 0; i < layerNames.length; i++) {
      var objects = layers[layerNames[i]];
      if (!objects) continue;
      for (var j = 0; j < objects.length; j++) {
        if (objects[j].id === id) return objects[j];
      }
    }
    return null;
  }

  function clearModifiedMarkers() {
    var modified = navTree.querySelectorAll(".modified");
    for (var i = 0; i < modified.length; i++) {
      modified[i].classList.remove("modified");
    }
  }

  // -----------------------------------------------------------------------
  // Utility functions
  // -----------------------------------------------------------------------
  function objectTypeName(typeCode) {
    var types = {
      0: "Unknown",
      1: "Point",
      2: "PointCloud",
      4: "Curve",
      8: "Surface",
      16: "Polysurface",
      32: "Mesh",
      256: "Light",
      512: "Annotation",
      4096: "InstanceReference",
      8192: "TextDot",
      65536: "Detail",
      131072: "Hatch",
      262144: "Extrusion"
    };
    return types[typeCode] || "Object";
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function roundNum(n) {
    return Math.round(n * 100) / 100;
  }

  // -----------------------------------------------------------------------
  // Event listeners
  // -----------------------------------------------------------------------
  chatSend.addEventListener("click", sendChat);

  chatInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      sendChat();
    }
  });

  navRefresh.addEventListener("click", loadInventory);
  navApply.addEventListener("click", applyEdits);
  navDiscard.addEventListener("click", discardEdits);

  // -----------------------------------------------------------------------
  // Keyboard shortcuts
  // -----------------------------------------------------------------------
  document.addEventListener("keydown", function(e) {
    // Alt+1: focus chat input
    if (e.altKey && e.key === "1") {
      e.preventDefault();
      chatInput.focus();
    }
    // Alt+2: focus model navigator
    if (e.altKey && e.key === "2") {
      e.preventDefault();
      navRefresh.focus();
    }
    // Alt+R: refresh inventory
    if (e.altKey && (e.key === "r" || e.key === "R")) {
      e.preventDefault();
      loadInventory();
    }
  });

  // -----------------------------------------------------------------------
  // Initialize
  // -----------------------------------------------------------------------
  connectSSE();
})();
</script>

</body>
</html>
